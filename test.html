<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      /* Modern Aesthetic UI */
      .overlay {
        position: fixed; font-family: 'Segoe UI', sans-serif; color: white;
        z-index: 1000; text-align: center; border-radius: 15px;
        backdrop-filter: blur(8px); background: rgba(0, 0, 0, 0.4);
      }
      #info-card {
        bottom: 20px; left: 50%; transform: translateX(-50%);
        width: 85%; padding: 15px; display: none;
      }
      #grow-btn {
        top: 20px; right: 20px; padding: 12px 24px; cursor: pointer;
        border: 2px solid #81C784; font-weight: bold;
      }
    </style>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <div id="grow-btn" class="overlay" onclick="growSawit()">GROW SAWIT (+1 Year)</div>
    
    <div id="info-card" class="overlay">
      <h2 id="title">Pohon Sawit</h2>
      <p id="description">Click the Grow button to start!</p>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-assets>
        <a-asset-item id="sawitModel" src="palm_oil.glb"></a-asset-item>
      </a-assets>

      <a-marker preset="hiro">
        
        <a-entity id="my-sawit" 
                  gltf-model="#sawitModel" 
                  scale="0.1 0.1 0.1" 
                  position="0 0 0"
                  class="clickable"
                  animation="property: scale; from: 0.1 0.1 0.1; to: 0.15 0.15 0.15; dur: 800; easing: easeOutQuad; startEvents: model-loaded">
        </a-entity>

      </a-marker>

      <a-entity camera>
        <a-cursor fuse="false" raycaster="objects: .clickable" color="#FFEB3B"></a-cursor>
      </a-entity>
    </a-scene>

    <script>
      let growthStage = 0;
      const tree = document.querySelector('#my-sawit');
      const infoCard = document.getElementById('info-card');
      const title = document.getElementById('title');
      const desc = document.getElementById('description');

      // Interaction Logic when clicking the model itself
      tree.addEventListener('click', () => {
        if(growthStage < 2) {
          showInfo("Bibit Sawit (Seedling)", "This small palm needs protection and consistent watering.");
        } else {
          showInfo("Mature Sawit", "The tree is fully grown and ready for its first CPO (Palm Oil) harvest!");
        }
      });

      // Growth Logic when clicking the button
      function growSawit() {
        growthStage++;
        if (growthStage === 1) {
          // Grow to medium size (TBM stage)
          tree.setAttribute('animation', {property: 'scale', to: '0.4 0.4 0.4', dur: 1200});
          showInfo("Growth: Stage 1", "The Sawit is developing its trunk and major fronds.");
        } else if (growthStage >= 2) {
          // Grow to full size (Mature stage)
          tree.setAttribute('animation', {property: 'scale', to: '1.0 1.0 1.0', dur: 1500});
          showInfo("Growth: Mature!", "Look closely! It might be time to harvest some 'brondolan' fruit.");
        }
      }

      function showInfo(t, d) {
        infoCard.style.display = 'block';
        title.innerText = t;
        desc.innerText = d;
      }
    </style>
  </body>
</html>
