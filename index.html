<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap');

        /* Disable all accidental scrolling and zooming */
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; touch-action: none; background: #fafafa;
            font-family: 'Montserrat', sans-serif;
        }

        model-viewer { width: 100%; height: 100%; --poster-color: transparent; }

        /* Floating Info Cards - Placed to the sides to NOT hide the model */
        .floating-card {
            position: absolute;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border-left: 4px solid #2e7d32;
            width: 160px; /* Slimmer so it doesn't overlap center */
            z-index: 10;
            pointer-events: none; /* Allows clicks to pass through to the 3D model */
        }

        .card-left { top: 60px; left: 15px; }
        .card-right { top: 60px; right: 15px; border-left: none; border-right: 4px solid #FBC02D; }

        .card-title { font-size: 10px; font-weight: 800; color: #2e7d32; margin-bottom: 4px; text-transform: uppercase; }
        .card-text { font-size: 11px; font-weight: 600; color: #333; line-height: 1.3; }

        /* Bottom Control Panel with Safe Area for Mobile Buttons */
        .bottom-panel {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(to top, rgba(255,255,255,1) 70%, rgba(255,255,255,0));
            padding-bottom: env(safe-area-inset-bottom, 35px); /* FIX: Prevents phone home bars from hiding button */
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            z-index: 100;
        }

        .nav-row { display: flex; align-items: center; gap: 25px; width: 100%; justify-content: center; }

        .nav-btn {
            background: white; color: #2e7d32; border: 2px solid #2e7d32;
            width: 44px; height: 44px; border-radius: 50%; font-weight: bold;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        .ar-btn {
            background: #2e7d32; color: white; border: none; 
            padding: 14px 40px; border-radius: 8px; font-weight: 800;
            text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 4px 12px rgba(46, 125, 50, 0.3);
        }

        /* Ad Card - Floating top center */
        .ad-thumb {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            width: 50px; height: 50px; border-radius: 8px; overflow: hidden;
            border: 2px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            z-index: 200; cursor: pointer;
        }
        .ad-thumb img { width: 100%; height: 100%; object-fit: cover; }

        /* Zoom Overlay */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; 
            justify-content: center; align-items: center; z-index: 3000;
        }
        #overlay img { max-width: 90%; max-height: 80%; border-radius: 8px; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="overlay" onclick="this.style.display='none'">
        <img src="palm_oil_seeds_ads.png">
    </div>

    <div class="ad-thumb" onclick="document.getElementById('overlay').style.display='flex'">
        <img src="palm_oil_seeds_ads.png">
    </div>

    <div id="info-l" class="floating-card card-left">
        <div class="card-title">🧬 GENETIKA</div>
        <div id="text-l" class="card-text">DxP 540 NG: Moderat tahan Ganoderma.</div>
    </div>

    <div id="info-r" class="floating-card card-right">
        <div class="card-title">📊 POTENSI</div>
        <div id="text-r" class="card-text">Rendemen Minyak: 26.5 - 27.4%.</div>
    </div>

    <model-viewer id="viewer"
        src="kecambah sawit.glb"
        scale="15 15 15"
        ar ar-modes="webxr scene-viewer quick-look" 
        camera-controls auto-rotate shadow-intensity="1"
        camera-orbit="0deg 75deg 2m">

        <div class="bottom-panel">
            <div class="nav-row">
                <button class="nav-btn" onclick="changeModel(-1)">❮</button>
                <button class="ar-btn" id="ar-trigger" onclick="viewer.activateAR()">Buka AR</button>
                <button class="nav-btn" onclick="changeModel(1)">❯</button>
            </div>
            <div style="font-size: 10px; font-weight: 800; color: #666; margin-bottom: 5px;" id="model-name">
                KECAMBAH SAWIT PPKS
            </div>
        </div>
    </model-viewer>

    <script>
        const products = [
            {
                name: "KECAMBAH SAWIT PPKS",
                l: "DxP 540 NG: Moderat tahan Ganoderma.",
                r: "Rendemen Minyak: 26.5 - 27.4%.",
                src: "kecambah sawit.glb",
                scale: "15 15 15",
                orbit: "0deg 75deg 2m"
            },
            {
                name: "PUPUK INDUSTRI",
                l: "Format: 52 x 85 cm. Karung Industri.",
                r: "Optimasi pertumbuhan vegetatif sawit.",
                src: "fertilizer.glb",
                scale: "280 280 280",
                orbit: "45deg 75deg 15m"
            },
            {
                name: "ALAT FERTIHOLE",
                l: "Dia: 13cm | Kedalaman: 20-30cm.",
                r: "Injeksi presisi untuk efisiensi pupuk.",
                src: "millers_falls_no._980_drill__game_ready_model.glb",
                scale: "0.8 0.8 0.8",
                orbit: "45deg 75deg 15m"
            }
        ];

        let idx = 0;
        const viewer = document.querySelector('#viewer');
        const textL = document.querySelector('#text-l');
        const textR = document.querySelector('#text-r');
        const mName = document.querySelector('#model-name');

        function changeModel(dir) {
            idx = (idx + dir + products.length) % products.length;
            const item = products[idx];
            
            viewer.src = item.src;
            viewer.scale = item.scale;
            viewer.setAttribute("camera-orbit", item.orbit);
            
            textL.innerText = item.l;
            textR.innerText = item.r;
            mName.innerText = item.name;
        }

        // Lock screen and address bar behavior
        window.addEventListener('load', () => {
            window.scrollTo(0, 1);
        });
    </script>
</body>
</html>
