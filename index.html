<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&display=swap');
        body { margin: 0; background: #fafafa; font-family: 'Montserrat', sans-serif; overflow: hidden; }
        model-viewer { width: 100%; height: 100vh; }

        /* Draggable-style Cards */
        .hotspot-card {
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            border-radius: 12px; padding: 12px; box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            width: 200px; border: 1px solid #ddd; cursor: grab; overflow: hidden;
        }
        .collapsed { max-height: 40px !important; }
        
        .card-header {
            font-size: 11px; color: #2e7d32; display: flex; 
            justify-content: space-between; align-items: center; margin-bottom: 8px;
        }
        .toggle-icon { font-size: 16px; color: #FBC02D; cursor: pointer; }
        .card-body { font-size: 12px; line-height: 1.4; color: #333; font-weight: 600; }

        /* Photo Card - Non-Square Aspect Ratio */
        .ad-card { width: 220px; border: 2px solid #2e7d32; padding: 5px; background: #fff; }
        .ad-card img { width: 100%; border-radius: 6px; display: block; }

        /* Navigation */
        .ui-nav {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; align-items: center; gap: 15px; z-index: 1000;
        }
        .ar-btn {
            background: #2e7d32; color: white; border: none; padding: 16px 35px;
            border-radius: 8px; font-weight: 800; box-shadow: 0 4px 0 #1b5e20; cursor: pointer;
        }
        .nav-btn {
            background: white; color: #2e7d32; border: 2px solid #2e7d32;
            width: 45px; height: 45px; border-radius: 8px; font-weight: bold; cursor: pointer;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <model-viewer id="viewer" src="kecambah sawit.glb" ar ar-modes="webxr scene-viewer quick-look" 
                  camera-controls auto-rotate camera-orbit="0deg 75deg 5m">

        <div id="c1" class="hotspot-card tree-info" slot="hotspot-1" data-position="-2 1.5 0" data-normal="0 0 1">
            <div class="card-header" onclick="toggle('c1')"><span>🧬 GENETICS</span><span class="toggle-icon">▼</span></div>
            <div class="card-body">Varietas DxP 540 NG. Anti Ganoderma. Yield: 35 Ton TBS/Ha. Rendemen: 27.4%.</div>
        </div>

        <div id="c2" class="hotspot-card ad-card tree-info" slot="hotspot-2" data-position="2 1.2 0.5" data-normal="0 0 1">
            <div class="card-header" onclick="toggle('c2')"><span>📷 AD CATALOG</span><span class="toggle-icon">▼</span></div>
            <img src="palm_oil_seeds_ads.png">
        </div>

        <div class="ui-nav">
            <button class="nav-btn" onclick="move(-1)">❮</button>
            <button class="ar-btn" onclick="viewer.activateAR()">OPEN AR CATALOG</button>
            <button class="nav-btn" onclick="move(1)">❯</button>
        </div>
    </model-viewer>

    <script>
        const data = [
            { src: "kecambah sawit.glb", scale: "1 1 1", cls: "tree-info", orb: "0deg 75deg 5m" },
            { src: "fertilizer.glb", scale: "50 50 50", cls: "fert-info", orb: "0deg 75deg 10m" },
            { src: "millers_falls_no._980_drill__game_ready_model.glb", scale: "1 1 1", cls: "hole-info", orb: "0deg 75deg 3m" }
        ];

        let idx = 0;
        const v = document.querySelector('#viewer');

        function toggle(id) { document.getElementById(id).classList.toggle('collapsed'); }

        function move(dir) {
            document.querySelectorAll('.tree-info, .fert-info, .hole-info').forEach(c => c.classList.add('hidden'));
            idx = (idx + dir + data.length) % data.length;
            const item = data[idx];
            
            v.src = item.src;
            v.setAttribute('scale', item.scale);
            v.setAttribute('camera-orbit', item.orb);
            
            document.querySelectorAll('.' + item.cls).forEach(c => c.classList.remove('hidden'));
        }
    </script>
</body>
</html>
