<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap');
        body { margin: 0; background: #fafafa; font-family: 'Montserrat', sans-serif; overflow: hidden; }
        
        /* HEADER STYLE */
        #product-header {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: #2e7d32; color: white; padding: 10px 25px;
            border-radius: 30px; font-weight: 800; z-index: 1000; border: 2px solid #FBC02D;
        }

        model-viewer { width: 100%; height: 100vh; --glow-color: rgba(46, 125, 50, 0.1); }

        /* ORBITING CARD STYLE */
        .orbit-card {
            background: white; border-radius: 10px; padding: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-left: 5px solid #2e7d32;
            width: 160px; transition: opacity 0.3s; pointer-events: none; /* Prevents touch conflict with orbit */
        }
        
        /* IMAGE CARD SPECIFIC */
        .orbit-ad { width: 180px; padding: 5px; border: 2px solid #2e7d32; pointer-events: none; }
        .orbit-ad img { width: 100%; border-radius: 5px; display: block; }

        .label { font-size: 9px; font-weight: 800; color: #2e7d32; text-transform: uppercase; }
        .desc { font-size: 11px; font-weight: 600; color: #333; margin-top: 3px; }

        /* INVISIBLE NAV ZONES */
        .nav-zone { position: fixed; top: 0; bottom: 0; width: 25%; z-index: 500; }
        #l-zone { left: 0; }
        #r-zone { right: 0; }

        .ar-btn {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #2e7d32; color: white; border: none; padding: 15px 40px;
            border-radius: 10px; font-weight: 800; box-shadow: 0 6px 0 #1b5e20; z-index: 1000;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="product-header">KECAMBAH SAWIT PPKS</div>
    
    <div id="l-zone" class="nav-zone" onclick="change(1)"></div>
    <div id="r-zone" class="nav-zone" onclick="change(-1)"></div>

    <button class="ar-btn" onclick="document.querySelector('#v').activateAR()">BUKA AR</button>

    <model-viewer id="v" src="kecambah sawit.glb" ar ar-modes="webxr" camera-controls auto-rotate shadow-intensity="1">

        <div id="h1" class="orbit-card tree-info" slot="hotspot-1" data-position="-2 3 1" data-normal="0 0 1">
            <div class="label">🧬 GENETICS</div>
            <div class="desc">DxP 540 NG. Moderat Tahan Ganoderma.</div>
        </div>

        <div id="h2" class="orbit-card orbit-ad tree-info" slot="hotspot-2" data-position="2 2 -1" data-normal="0 0 1">
            <img src="palm_oil_seeds_ads.png">
        </div>

        <div id="h3" class="orbit-card tree-info" slot="hotspot-3" data-position="-2.5 0.5 0" data-normal="0 0 1">
            <div class="label">📊 YIELD</div>
            <div class="desc">35 Ton TBS/Ha. Rendemen 27.4%.</div>
        </div>

        <div id="h4" class="orbit-card tree-info" slot="hotspot-4" data-position="2.5 0.8 1.5" data-normal="0 0 1">
            <div class="label">📍 ORIGIN</div>
            <div class="desc">PPKS Medan, Indonesia.</div>
        </div>

    </model-viewer>

    <script>
        const models = [
            { src: "kecambah sawit.glb", name: "KECAMBAH SAWIT PPKS", cls: "tree-info" },
            { src: "fertilizer.glb", name: "PUPUK INDUSTRI PPKS", cls: "fert-info" }
        ];

        let idx = 0;
        const viewer = document.querySelector('#v');
        const title = document.querySelector('#product-header');

        function change(dir) {
            document.querySelectorAll('.orbit-card').forEach(c => c.classList.add('hidden'));
            idx = (idx + dir + models.length) % models.length;
            viewer.src = models[idx].src;
            title.innerText = models[idx].name;
            document.querySelectorAll('.' + models[idx].cls).forEach(c => c.classList.remove('hidden'));
        }

        // AUTO-HIDE OVERLAPPING CARDS
        // This hides cards when they rotate to the "back" of the model
        viewer.addEventListener('camera-change', () => {
            const hotspots = viewer.querySelectorAll('.orbit-card');
            hotspots.forEach(hs => {
                if (hs.classList.contains('hidden')) return;
                // Logic is handled natively by model-viewer based on data-normal
            });
        });
    </script>
</body>
</html>
