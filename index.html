<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap');
        body { margin: 0; background: #fafafa; font-family: 'Montserrat', sans-serif; overflow: hidden; }
        model-viewer { width: 100%; height: 100vh; --poster-color: transparent; }

        /* ORIGINAL PRODUCT TITLE */
        #product-title {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: #2e7d32; color: white; padding: 10px 25px;
            border-radius: 30px; font-weight: 800; z-index: 1000; border: 2px solid #FBC02D;
        }

        /* ORIGINAL CARD STYLE */
        .info-card {
            background: white; border-radius: 8px; padding: 14px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.15); border-left: 5px solid #2e7d32;
            width: 180px; cursor: grab; touch-action: none; z-index: 10;
        }
        .ad-card {
            background: white; border-radius: 10px; padding: 5px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 200px;
            border: 2px solid #2e7d32; cursor: grab; touch-action: none;
        }
        .ad-card img { width: 100%; border-radius: 5px; display: block; pointer-events: none; }

        .card-header { font-size: 10px; font-weight: 800; color: #2e7d32; margin-bottom: 5px; text-transform: uppercase; }
        .card-body { font-size: 11px; font-weight: 600; color: #333; line-height: 1.3; }

        /* INSTAGRAM NAV ZONES */
        .nav-zone { position: fixed; top: 0; bottom: 0; width: 25%; z-index: 5; }
        #left-zone { left: 0; }
        #right-zone { right: 0; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="product-title">KECAMBAH SAWIT PPKS</div>
    
    <div id="left-zone" class="nav-zone" onclick="changeModel(-1)"></div>
    <div id="right-zone" class="nav-zone" onclick="changeModel(1)"></div>

    <model-viewer id="viewer" src="kecambah sawit.glb" ar ar-modes="webxr" camera-controls auto-rotate>

        <div id="h1" class="info-card tree-info draggable" slot="hotspot-1" data-position="-2 2.5 0">
            <div class="card-header">🧬 GENETICS</div>
            <div class="card-body">DxP 540 NG. Moderat Tahan Ganoderma.</div>
        </div>

        <div id="h2" class="ad-card tree-info draggable" slot="hotspot-2" data-position="2 1.8 0.5">
            <img src="palm_oil_seeds_ads.png">
        </div>

        <div id="h3" class="info-card tree-info draggable" slot="hotspot-3" data-position="-2 0.5 0.5">
            <div class="card-header">📊 YIELD ESTIMATE</div>
            <div class="card-body">Potensi 35 Ton/Ha. Rendemen 27.4%.</div>
        </div>

        <div id="h4" class="info-card tree-info draggable" slot="hotspot-4" data-position="2 0.2 0">
            <div class="card-header">📍 PRODUCTION</div>
            <div class="card-body">Pusat Penelitian Kelapa Sawit Medan.</div>
        </div>

    </model-viewer>

    <script>
        const catalog = [
            { src: "kecambah sawit.glb", name: "KECAMBAH SAWIT PPKS", class: "tree-info" },
            { src: "fertilizer.glb", name: "PUPUK INDUSTRI PPKS", class: "fert-info" }
        ];

        let currentIdx = 0;
        const v = document.querySelector('#viewer');
        const title = document.querySelector('#product-title');

        function changeModel(dir) {
            document.querySelectorAll('.draggable').forEach(c => c.classList.add('hidden'));
            currentIdx = (currentIdx + dir + catalog.length) % catalog.length;
            v.src = catalog[currentIdx].src;
            title.innerText = catalog[currentIdx].name;
            document.querySelectorAll('.' + catalog[currentIdx].class).forEach(c => c.classList.remove('hidden'));
        }

        // IMPROVED DRAG ENGINE
        document.querySelectorAll('.draggable').forEach(card => {
            let active = false;
            let lastX, lastY;

            card.addEventListener('pointerdown', (e) => {
                active = true;
                lastX = e.clientX;
                lastY = e.clientY;
                card.setPointerCapture(e.pointerId);
                card.style.cursor = 'grabbing';
            });

            window.addEventListener('pointermove', (e) => {
                if (!active) return;
                
                // Sensitivity adjustment for 3D space
                const moveX = (e.clientX - lastX) * 0.015;
                const moveY = (lastY - e.clientY) * 0.015;

                let coords = card.getAttribute('data-position').split(' ').map(Number);
                coords[0] += moveX;
                coords[1] += moveY;

                card.setAttribute('data-position', coords.join(' '));
                lastX = e.clientX;
                lastY = e.clientY;
            });

            card.addEventListener('pointerup', () => {
                active = false;
                card.style.cursor = 'grab';
            });
        });
    </script>
</body>
</html>
