<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      /* Modern Glassmorphism Buttons */
      .nav-btn {
        position: fixed; top: 50%; transform: translateY(-50%);
        width: 70px; height: 70px; background: rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(10px); color: white; border-radius: 50%;
        display: flex; justify-content: center; align-items: center;
        font-size: 40px; z-index: 1000; cursor: pointer; border: 1px solid rgba(255,255,255,0.3);
        user-select: none;
      }
      #prev { left: 15px; }
      #next { right: 15px; }
      
      #label-container {
        position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(5px);
        color: white; padding: 10px 25px; border-radius: 30px;
        text-align: center; z-index: 1000; font-family: 'Segoe UI', sans-serif;
        border: 1px solid rgba(255,255,255,0.2);
      }
    </style>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <div id="prev" class="nav-btn" onclick="changeModel(-1)">&#10094;</div>
    <div id="next" class="nav-btn" onclick="changeModel(1)">&#10095;</div>
    
    <div id="label-container">
      <strong id="model-name">Loading...</strong>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      <a-assets>
        <a-asset-item id="tree1" src="animal_crossing_palm_tree_background.glb"></a-asset-item>
        <a-asset-item id="tree2" src="psx_birch_tree.glb"></a-asset-item>
        <a-asset-item id="tree3" src="sakura_tree_01_-_low_poly_model.glb"></a-asset-item>
      </a-assets>

      <a-marker type="pattern" url="pattern-images.patt">
        <a-entity id="ar-model" 
                  gltf-model="#tree1" 
                  position="0 0 0" 
                  rotation="0 0 0"
                  animation="property: rotation; to: 0 360 0; loop: true; dur: 15000; easing: linear">
        </a-entity>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      // Configuration for each tree (Adjust scale if they look too tiny or huge)
      const treeList = [
        { id: "#tree1", name: "Sawit Palm", scale: "0.2 0.2 0.2" },
        { id: "#tree2", name: "PSX Birch", scale: "0.005 0.005 0.005" }, // Birch models are often huge
        { id: "#tree3", name: "Sakura Blossom", scale: "0.1 0.1 0.1" }
      ];

      let currentIndex = 0;
      const modelEntity = document.querySelector('#ar-model');
      const nameLabel = document.querySelector('#model-name');

      function updateModel() {
        const current = treeList[currentIndex];
        
        // Change the model
        modelEntity.setAttribute('gltf-model', current.id);
        
        // Update the label
        nameLabel.innerText = current.name;
        
        // Adjust the scale specifically for this model
        modelEntity.setAttribute('scale', current.scale);

        // Add a nice "pop" animation when switching
        modelEntity.removeAttribute('animation__scale');
        modelEntity.setAttribute('animation__scale', 'property: scale; from: 0 0 0; to: ' + current.scale + '; dur: 400; easing: easeOutBack');
      }

      function changeModel(dir) {
        currentIndex += dir;
        // Loop Logic
        if (currentIndex < 0) currentIndex = treeList.length - 1;
        if (currentIndex >= treeList.length) currentIndex = 0;
        updateModel();
      }

      // Start the first model correctly
      window.onload = updateModel;
    </script>
  </body>
</html>
