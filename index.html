<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');

        :root {
            --ppks-green: #2e7d32;
            --ppks-gold: #FBC02D;
            --ppks-dark: #1b1b1b;
        }

        body { margin: 0; background: #000; font-family: 'Montserrat', sans-serif; color: white; overflow: hidden; }
        
        /* 3D Viewer - Full Background */
        model-viewer {
            width: 100vw;
            height: 100vh;
            background-color: #fafafa;
            --poster-color: transparent;
        }

        /* Top Progress Bars (Instagram Style) */
        .progress-container {
            position: absolute; top: 15px; left: 0; width: 100%;
            display: flex; gap: 5px; padding: 0 10px; box-sizing: border-box; z-index: 100;
        }
        .bar { height: 3px; flex: 1; background: rgba(0,0,0,0.1); border-radius: 2px; overflow: hidden; }
        .bar-fill { height: 100%; width: 0%; background: var(--ppks-green); transition: width 0.1s linear; }
        .bar.active .bar-fill { width: 100%; transition: none; }

        /* Product Info Section (Bottom Sheet) */
        .bottom-info {
            position: absolute; bottom: 0; left: 0; width: 100%;
            background: linear-gradient(transparent, rgba(0,0,0,0.8) 20%);
            padding: 40px 20px 100px 20px; box-sizing: border-box;
            z-index: 50; pointer-events: none;
        }
        .product-label { font-weight: 900; font-size: 20px; color: var(--ppks-gold); text-transform: uppercase; margin-bottom: 5px; }
        .product-desc { font-size: 13px; line-height: 1.5; max-width: 85%; font-weight: 500; }

        /* Interactive Ads Overlay */
        .ad-mini-card {
            position: absolute; right: 20px; bottom: 120px;
            width: 80px; height: 80px; border: 2px solid white;
            border-radius: 12px; overflow: hidden; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 60;
            pointer-events: auto;
        }
        .ad-mini-card img { width: 100%; height: 100%; object-fit: cover; }

        /* Navigation Taps (Left/Right side of screen) */
        .nav-tap {
            position: absolute; top: 0; width: 30%; height: 80%; z-index: 40;
        }
        .nav-left { left: 0; }
        .nav-right { right: 0; }

        /* AR Floating Button */
        .ar-float-btn {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: var(--ppks-green); color: white; border: none;
            padding: 12px 30px; border-radius: 30px; font-weight: 800;
            font-size: 12px; letter-spacing: 1px; z-index: 100;
            box-shadow: 0 4px 15px rgba(46, 125, 50, 0.4); cursor: pointer;
        }

        /* Lightbox for Ads */
        #zoom-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: none;
            justify-content: center; align-items: center; z-index: 2000;
        }
        #zoom-overlay img { max-width: 90%; max-height: 80%; border-radius: 10px; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="zoom-overlay" onclick="this.style.display='none'">
        <img src="palm_oil_seeds_ads.png">
    </div>

    <div class="progress-container" id="progress-bars"></div>

    <div class="nav-tap nav-left" onclick="changeModel(-1)"></div>
    <div class="nav-tap nav-right" onclick="changeModel(1)"></div>

    <model-viewer id="viewer"
        src="kecambah sawit.glb"
        scale="15 15 15"
        ar ar-modes="webxr scene-viewer quick-look" 
        camera-controls auto-rotate
        shadow-intensity="1"
        camera-orbit="0deg 75deg 2m">
        
        <div class="bottom-info">
            <div class="product-label" id="p-name">Kecambah Kelapa Sawit</div>
            <div class="product-desc" id="p-desc">Varietas unggul PPKS dengan moderat tahan Ganoderma dan rendemen minyak tinggi.</div>
        </div>

        <div class="ad-mini-card" onclick="document.getElementById('zoom-overlay').style.display='flex'">
            <img src="palm_oil_seeds_ads.png">
        </div>

        <button class="ar-float-btn" onclick="viewer.activateAR()">LIHAT DI RUANGAN (AR)</button>
    </model-viewer>

    <script>
        const products = [
            {
                name: "Kecambah Kelapa Sawit",
                desc: "Varietas DxP 540 NG: Generasi baru tahan Ganoderma. Rendemen minyak 26.5% - 27.4%.",
                src: "kecambah sawit.glb",
                scale: "15 15 15"
            },
            {
                name: "Pupuk Industri PPKS",
                desc: "Formula khusus untuk optimasi pertumbuhan vegetatif dan generatif kelapa sawit.",
                src: "fertilizer.glb",
                scale: "280 280 280"
            },
            {
                name: "Alat Fertihole",
                desc: "Injeksi presisi untuk efisiensi pemupukan. Diameter 13cm dengan kedalaman terukur.",
                src: "millers_falls_no._980_drill__game_ready_model.glb",
                scale: "0.8 0.8 0.8"
            }
        ];

        let idx = 0;
        const viewer = document.querySelector('#viewer');
        const pName = document.querySelector('#p-name');
        const pDesc = document.querySelector('#p-desc');
        const progressContainer = document.getElementById('progress-bars');

        // Build Progress Bars
        function initBars() {
            progressContainer.innerHTML = '';
            products.forEach((_, i) => {
                const bar = document.createElement('div');
                bar.className = 'bar' + (i <= idx ? ' active' : '');
                const fill = document.createElement('div');
                fill.className = 'bar-fill';
                bar.appendChild(fill);
                progressContainer.appendChild(bar);
            });
        }

        function changeModel(dir) {
            idx = (idx + dir + products.length) % products.length;
            const item = products[idx];
            
            // Smoothly swap model
            viewer.src = item.src;
            viewer.scale = item.scale;
            
            // Update UI Text
            pName.innerText = item.name;
            pDesc.innerText = item.desc;

            // Update Progress Bars
            initBars();
        }

        initBars();
    </script>
</body>
</html>
