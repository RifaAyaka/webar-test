<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/dist/gestures.js"></script>
    <style>
      .touch-zone { position: fixed; top: 0; bottom: 0; width: 35%; z-index: 999; }
      #left-zone { left: 0; }
      #right-zone { right: 0; }

      #info-card {
        position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(10px);
        color: white; padding: 15px 20px; border-radius: 20px;
        text-align: center; z-index: 1000; font-family: 'Segoe UI', sans-serif;
        border: 1px solid rgba(255,255,255,0.3); width: 85%; max-width: 450px;
        pointer-events: none;
      }
      
      #product-name { font-size: 18px; display: block; margin-bottom: 8px; color: #81C784; text-transform: uppercase; font-weight: bold; }
      #product-desc { font-size: 13px; line-height: 1.5; opacity: 0.9; text-align: left; }
      
      #nav-hint {
        position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.5); color: white; padding: 8px 15px;
        border-radius: 20px; font-size: 11px; z-index: 1000;
      }
    </style>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <div id="left-zone" class="touch-zone" onclick="changeModel(-1)"></div>
    <div id="right-zone" class="touch-zone" onclick="changeModel(1)"></div>
    
    <div id="info-card">
      <strong id="product-name">Palm Oil Tree</strong>
      <div id="product-desc">Loading...</div>
    </div>

    <div id="nav-hint">Tap edges to switch • Drag to rotate</div>

    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false;"
      gesture-detector
      renderer="colorManagement: true; logarithmicDepthBuffer: true;">
      
      <a-assets>
        <a-asset-item id="model-tree" src="animal_crossing_palm_tree_background.glb"></a-asset-item>
        <a-asset-item id="model-fertilizer" src="fertilizer.glb"></a-asset-item>
        <a-asset-item id="model-fertihole" src="millers_falls_no._980_drill__game_ready_model.glb"></a-asset-item>
      </a-assets>

      <a-marker type="pattern" url="pattern-images.patt" raycaster="objects: .clickable" emitevents="true" cursor="fuse: false; rayOrigin: mouse;">
        
        <a-entity id="ent-tree" gltf-model="#model-tree" class="clickable" gesture-handler scale="5 5 5" position="0 0.5 0" visible="true"></a-entity>
        
        <a-entity id="ent-fertilizer" gltf-model="#model-fertilizer" class="clickable" gesture-handler scale="60 60 60" position="0 0 0" visible="false"></a-entity>
        
        <a-entity id="ent-fertihole" gltf-model="#model-fertihole" class="clickable" gesture-handler scale="2.5 2.5 2.5" position="0 0.2 0" visible="false"></a-entity>

      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      const products = [
        {
          el: "#ent-tree",
          name: "Palm Oil Tree",
          desc: "Pohon kelapa sawit adalah tanaman perkebunan vital penghasil CPO. Membutuhkan perawatan intensif dan nutrisi seimbang untuk hasil panen maksimal."
        },
        {
          el: "#ent-fertilizer",
          name: "Fertilizer (Pupuk)",
          desc: "Nutrisi esensial (NPK+Mg+B) untuk meningkatkan berat janjang dan kualitas buah sawit. Aplikasi tepat waktu menjamin produktivitas berkelanjutan."
        },
        {
          el: "#ent-fertihole",
          name: "Fertihole (Alsin)",
          desc: "Alat pembuat lubang pupuk (Pocket System). <br>• Kapasitas: 500g/pocket <br>• Kedalaman: 20-30 cm <br>• Diameter: 13 cm <br>• Efisiensi: Menghindari penguapan, pencucian, dan erosi pupuk secara maksimal."
        }
      ];

      let currentIndex = 0;

      function updateUI() {
        document.getElementById('product-name').innerText = products[currentIndex].name;
        document.getElementById('product-desc').innerHTML = products[currentIndex].desc;
      }

      function changeModel(dir) {
        document.querySelector(products[currentIndex].el).setAttribute('visible', 'false');

        currentIndex += dir;
        if (currentIndex < 0) currentIndex = products.length - 1;
        if (currentIndex >= products.length) currentIndex = 0;

        const newModel = document.querySelector(products[currentIndex].el);
        newModel.setAttribute('visible', 'true');
        newModel.setAttribute('rotation', '0 0 0');
        
        updateUI();

        const s = newModel.getAttribute('scale');
        newModel.setAttribute('animation__pop', {
          property: 'scale',
          from: '0 0 0',
          to: `${s.x} ${s.y} ${s.z}`,
          dur: 400,
          easing: 'easeOutBack'
        });
      }

      window.onload = updateUI;
    </script>
  </body>
</html>
