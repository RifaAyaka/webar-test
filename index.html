<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      .touch-zone { position: fixed; top: 0; bottom: 0; width: 30%; z-index: 999; }
      #left-zone { left: 0; }
      #right-zone { right: 0; }
      
      /* The floating UI style */
      .info-panel {
        background: rgba(0, 0, 0, 0.8);
        color: white;
        padding: 20px;
        border-radius: 15px;
        border: 2px solid #81C784;
        font-family: Arial, sans-serif;
        width: 280px;
      }
      .info-title { font-size: 24px; font-weight: bold; color: #81C784; margin-bottom: 10px; border-bottom: 1px solid #444; }
      .info-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 16px; }
      .label { opacity: 0.7; }
    </style>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <div id="left-zone" class="touch-zone" onclick="changeModel(-1)"></div>
    <div id="right-zone" class="touch-zone" onclick="changeModel(1)"></div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" renderer="logarithmicDepthBuffer: true;">
      <a-assets>
        <a-asset-item id="model-tree" src="animal_crossing_palm_tree_background.glb"></a-asset-item>
        <a-asset-item id="model-fertilizer" src="fertilizer.glb"></a-asset-item>
        <a-asset-item id="model-fertihole" src="millers_falls_no._980_drill__game_ready_model.glb"></a-asset-item>
      </a-assets>

      <a-marker type="pattern" url="pattern-images.patt">
        
        <a-entity id="group-tree" visible="true">
          <a-entity gltf-model="#model-tree" scale="8 8 8" position="0 0 0"></a-entity>
          <a-entity position="2 3 0" rotation="-90 0 0">
            <a-plane width="3" height="1.5" color="#000" opacity="0.8">
                <a-text value="OIL PALM TREE\nHeight: 20-30 Meters\nYield: CPO & PKO" align="center" width="4"></a-text>
            </a-plane>
          </a-entity>
        </a-entity>

        <a-entity id="group-fertilizer" visible="false">
          <a-entity gltf-model="#model-fertilizer" scale="50 50 50" position="0 0 0"></a-entity>
          <a-entity position="1.5 1 0" rotation="-90 0 0">
            <a-plane width="2.5" height="1.2" color="#000" opacity="0.8">
                <a-text value="FERTILIZER BAG\nSize: 52 x 85 cm\nSystem: Pocket Application" align="center" width="3.5"></a-text>
            </a-plane>
          </a-entity>
        </a-entity>

        <a-entity id="group-fertihole" visible="false">
          <a-entity gltf-model="#model-fertihole" scale="2.5 2.5 2.5" position="0 0.5 0"></a-entity>
          <a-entity position="2 1.5 0" rotation="-90 0 0">
            <a-plane width="3" height="2" color="#000" opacity="0.9" side="double">
                <a-text value="FERTIHOLE SPECS" position="0 0.7 0.1" align="center" color="#81C784" width="5"></a-text>
                <a-text value="Diameter: 13 cm\nDepth: 20-30 cm\nCap: 500g / Pocket\nFuel: Petrol Mix" position="0 -0.1 0.1" align="center" width="3.8"></a-text>
            </a-plane>
          </a-entity>
        </a-entity>

      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      const groups = ["#group-tree", "#group-fertilizer", "#group-fertihole"];
      let currentIndex = 0;

      function changeModel(dir) {
        // Hide current
        document.querySelector(groups[currentIndex]).setAttribute('visible', 'false');

        // Loop
        currentIndex += dir;
        if (currentIndex < 0) currentIndex = groups.length - 1;
        if (currentIndex >= groups.length) currentIndex = 0;

        // Show next
        document.querySelector(groups[currentIndex]).setAttribute('visible', 'true');
      }
    </script>
  </body>
</html>
