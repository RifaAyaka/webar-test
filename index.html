<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap');

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #ffffff; font-family: 'Montserrat', sans-serif;
        }

        model-viewer { width: 100%; height: 100%; --poster-color: transparent; }

        /* Top Bar Label */
        .header-label {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(46, 125, 50, 0.9); color: white;
            padding: 8px 20px; border-radius: 20px; font-size: 10px;
            font-weight: 800; letter-spacing: 1px; z-index: 100; text-transform: uppercase;
        }

        /* Side Tap Areas (Instagram Style) */
        .nav-tap {
            position: absolute; top: 0; width: 25%; height: 80%; z-index: 50;
        }
        .nav-prev { left: 0; }
        .nav-next { right: 0; }

        /* Floating Info - BOTTOM LEFT (Card/Table) */
        .info-panel {
            position: absolute; bottom: 120px; left: 20px;
            background: white; border-radius: 12px; width: 160px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-left: 5px solid #2e7d32; padding: 12px; z-index: 60;
            pointer-events: none;
        }
        .info-title { font-size: 9px; font-weight: 800; color: #2e7d32; margin-bottom: 5px; }
        .info-row { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 4px 0; }
        .info-key { font-size: 9px; color: #777; }
        .info-val { font-size: 10px; font-weight: 700; color: #333; }

        /* Floating Photo - BOTTOM RIGHT */
        .photo-card {
            position: absolute; bottom: 120px; right: 20px;
            width: 90px; height: 90px; background: white;
            border-radius: 12px; padding: 5px; z-index: 60;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 2px solid #FBC02D;
        }
        .photo-card img { width: 100%; height: 100%; border-radius: 8px; object-fit: cover; }

        /* Fixed Center AR Button */
        .ar-container {
            position: absolute; bottom: 40px; left: 0; width: 100%;
            display: flex; justify-content: center; z-index: 200;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .ar-btn {
            background: #2e7d32; color: white; border: none;
            padding: 16px 50px; border-radius: 12px; font-weight: 800;
            font-size: 14px; text-transform: uppercase; cursor: pointer;
            box-shadow: 0 5px 15px rgba(46, 125, 50, 0.4);
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="header-label" id="top-label">Kecambah Sawit PPKS</div>

    <div class="nav-tap nav-prev" onclick="changeModel(-1)"></div>
    <div class="nav-tap nav-next" onclick="changeModel(1)"></div>

    <div class="info-panel">
        <div class="info-title">DESKRIPSI PRODUK</div>
        <div class="info-row"><span class="info-key">Varietas</span><span class="info-val" id="val-1">DxP 540 NG</span></div>
        <div class="info-row"><span class="info-key">Karakter</span><span class="info-val" id="val-2">Tahan Gano</span></div>
        <div class="info-row" style="border:none;"><span class="info-key">Rendemen</span><span class="info-val" id="val-3">27.4%</span></div>
    </div>

    <div class="photo-card">
        <img id="side-photo" src="palm_oil_seeds_ads.png">
    </div>

    <model-viewer id="viewer"
        src="kecambah sawit.glb"
        ar ar-modes="webxr scene-viewer quick-look" 
        camera-controls auto-rotate shadow-intensity="1"
        camera-orbit="0deg 75deg 2m"
        min-camera-orbit="auto auto 1m"
        interaction-prompt="none">

        <div class="ar-container">
            <button class="ar-btn" id="ar-button">Buka AR</button>
        </div>
    </model-viewer>

    <script>
        const products = [
            {
                name: "Kecambah Sawit PPKS",
                v1: "DxP 540 NG", v2: "Anti Ganoderma", v3: "27.4%",
                src: "kecambah sawit.glb",
                orbit: "0deg 75deg 2m",
                photo: "palm_oil_seeds_ads.png"
            },
            {
                name: "Pupuk Sawit Unggul",
                v1: "Formula Cair", v2: "Quick Starter", v3: "High Yield",
                src: "fertilizer.glb",
                orbit: "45deg 75deg 15m",
                photo: "palm_oil_seeds_ads.png"
            }
        ];

        let idx = 0;
        const viewer = document.querySelector('#viewer');
        const arBtn = document.querySelector('#ar-button');

        // Handles Model and UI Changes
        function changeModel(dir) {
            idx = (idx + dir + products.length) % products.length;
            const item = products[idx];
            
            viewer.src = item.src;
            viewer.setAttribute("camera-orbit", item.orbit);
            
            document.getElementById('top-label').innerText = item.name;
            document.getElementById('val-1').innerText = item.v1;
            document.getElementById('val-2').innerText = item.v2;
            document.getElementById('val-3').innerText = item.v3;
            document.getElementById('side-photo').src = item.photo;
        }

        // AR Button Logic: Swap text when entering AR
        arBtn.addEventListener('click', () => {
            if (viewer.canActivateAR) {
                viewer.activateAR();
            }
        });

        // Detect if user returns from AR to change text back
        viewer.addEventListener('ar-status', (event) => {
            if (event.detail.status === 'session-started') {
                arBtn.innerText = "Kembali";
            } else {
                arBtn.innerText = "Buka AR";
            }
        });
    </script>
</body>
</html>
