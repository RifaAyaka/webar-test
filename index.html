<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap');
        
        body { margin: 0; background: #ffffff; font-family: 'Montserrat', sans-serif; overflow: hidden; }
        model-viewer { width: 100%; height: 100vh; --poster-color: transparent; }

        /* PROFESSIONAL TOP BAR */
        #product-header {
            position: fixed; top: 0; left: 0; right: 0; height: 70px;
            background: linear-gradient(to bottom, rgba(255,255,255,1), rgba(255,255,255,0));
            display: flex; justify-content: center; align-items: center; z-index: 1000;
        }
        #product-title {
            background: #2e7d32; color: white; padding: 8px 25px;
            border-radius: 50px; font-weight: 800; font-size: 14px;
            box-shadow: 0 4px 15px rgba(46, 125, 50, 0.3); border: 2px solid #FBC02D;
        }

        /* GLASSMORPHISM CARD STYLE */
        .pro-card {
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px);
            border-radius: 15px; padding: 15px; width: 190px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid rgba(46, 125, 50, 0.2);
            cursor: grab; touch-action: none; transition: transform 0.2s ease;
        }
        .pro-card:active { cursor: grabbing; transform: scale(1.05); border-color: #2e7d32; }

        .ad-frame { 
            width: 210px; padding: 6px; background: white; 
            border: 2px solid #2e7d32; border-radius: 12px;
        }
        .ad-frame img { width: 100%; border-radius: 8px; pointer-events: none; }

        .tag { font-size: 9px; font-weight: 800; color: #2e7d32; margin-bottom: 4px; display: block; }
        .content { font-size: 12px; font-weight: 600; color: #444; line-height: 1.4; }

        /* INVISIBLE NAV */
        .nav-hitbox { position: fixed; top: 0; bottom: 0; width: 20%; z-index: 500; }
        #prev-area { left: 0; }
        #next-area { right: 0; }

        /* AR BUTTON */
        .ar-anchor {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #2e7d32; color: white; padding: 15px 40px;
            border-radius: 12px; font-weight: 800; border: none;
            box-shadow: 0 8px 0 #1b5e20; cursor: pointer; z-index: 1000;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="product-header">
        <div id="product-title">KECAMBAH SAWIT PPKS</div>
    </div>
    
    <div id="prev-area" class="nav-hitbox" onclick="step(-1)"></div>
    <div id="next-area" class="nav-hitbox" onclick="step(1)"></div>

    <button class="ar-anchor" onclick="document.querySelector('#v').activateAR()">BUKA AR</button>

    <model-viewer id="v" src="kecambah sawit.glb" ar ar-modes="webxr" camera-controls auto-rotate shadow-intensity="1">

        <div id="c1" class="pro-card tree-info drag-engine" slot="hotspot-1" data-position="-2.5 2 0">
            <span class="tag">🧬 SPESIFIKASI</span>
            <div class="content">Varietas DxP 540 NG. Karakter Tahan Ganoderma.</div>
        </div>

        <div id="c2" class="pro-card ad-frame tree-info drag-engine" slot="hotspot-2" data-position="2.5 1.5 0.5">
            <img src="palm_oil_seeds_ads.png">
        </div>

        <div id="c3" class="pro-card tree-info drag-engine" slot="hotspot-3" data-position="-2.5 0.5 0.5">
            <span class="tag">📊 ESTIMASI HASIL</span>
            <div class="content">Yield: 35 Ton/Ha. Rendemen: 27.4%.</div>
        </div>

        <div id="c4" class="pro-card tree-info drag-engine" slot="hotspot-4" data-position="2.5 0 0">
            <span class="tag">🏢 PRODUSEN</span>
            <div class="content">Pusat Penelitian Kelapa Sawit Medan.</div>
        </div>

    </model-viewer>

    <script>
        const items = [
            { src: "kecambah sawit.glb", name: "KECAMBAH SAWIT PPKS", cls: "tree-info" },
            { src: "fertilizer.glb", name: "PUPUK INDUSTRI PPKS", cls: "fert-info" }
        ];

        let currentIdx = 0;
        const viewer = document.querySelector('#v');
        const title = document.querySelector('#product-title');

        function step(dir) {
            document.querySelectorAll('.drag-engine').forEach(c => c.classList.add('hidden'));
            currentIdx = (currentIdx + dir + items.length) % items.length;
            viewer.src = items[currentIdx].src;
            title.innerText = items[currentIdx].name;
            document.querySelectorAll('.' + items[currentIdx].cls).forEach(c => c.classList.remove('hidden'));
        }

        // --- THE ENGINE: PRO DRAG & DEPTH CONTROL ---
        let topZ = 100;

        document.querySelectorAll('.drag-engine').forEach(card => {
            let dragging = false;
            let startX, startY;

            card.addEventListener('pointerdown', (e) => {
                dragging = true;
                topZ++; // Increase Z-layer so the active card is always on top
                card.style.zIndex = topZ;
                
                startX = e.clientX;
                startY = e.clientY;
                card.setPointerCapture(e.pointerId);
            });

            window.addEventListener('pointermove', (e) => {
                if (!dragging) return;
                
                // Fine-tuned movement for mobile precision
                const dx = (e.clientX - startX) * 0.012; 
                const dy = (startY - e.clientY) * 0.012;

                let pos = card.getAttribute('data-position').split(' ').map(Number);
                pos[0] += dx;
                pos[1] += dy;

                card.setAttribute('data-position', pos.join(' '));
                startX = e.clientX;
                startY = e.clientY;
            });

            card.addEventListener('pointerup', () => dragging = false);
        });
    </script>
</body>
</html>
