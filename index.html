<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/dist/gestures.js"></script>
    <style>
      /* Instagram-style tap zones */
      .touch-zone {
        position: fixed; top: 0; bottom: 0; width: 35%; z-index: 999;
      }
      #left-zone { left: 0; }
      #right-zone { right: 0; }

      /* UI Labels */
      #ui-layer {
        position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(10px);
        color: white; padding: 15px 25px; border-radius: 20px;
        text-align: center; z-index: 1000; font-family: sans-serif;
        border: 1px solid rgba(255,255,255,0.3); pointer-events: none;
      }
      
      /* Reset button if it gets stuck */
      #reset-btn {
        position: fixed; bottom: 20px; right: 20px;
        background: rgba(255, 255, 255, 0.2); color: white;
        padding: 10px; border-radius: 5px; z-index: 1001;
        font-size: 12px; cursor: pointer; text-decoration: underline;
      }
    </style>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <div id="left-zone" class="touch-zone" onclick="changeModel(-1)"></div>
    <div id="right-zone" class="touch-zone" onclick="changeModel(1)"></div>
    
    <div id="ui-layer">
      <strong id="model-name">Sawit Palm</strong><br>
      <small style="opacity: 0.6;">Tap edges to switch • Drag to rotate</small>
    </div>

    <div id="reset-btn" onclick="location.reload()">Refresh Page</div>

    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix;"
      gesture-detector
      renderer="logarithmicDepthBuffer: true; colorManagement: true;">
      
      <a-assets>
        <a-asset-item id="tree-palm" src="animal_crossing_palm_tree_background.glb"></a-asset-item>
        <a-asset-item id="tree-birch" src="psx_birch_tree.glb"></a-asset-item>
        <a-asset-item id="tree-sakura" src="sakura_tree_01_-_low_poly_model.glb"></a-asset-item>
      </a-assets>

      <a-marker type="pattern" url="pattern-images.patt" raycaster="objects: .clickable" emitevents="true" cursor="fuse: false; rayOrigin: mouse;">
        
        <a-entity id="ent-palm" gltf-model="#tree-palm" class="clickable" gesture-handler scale="1.5 1.5 1.5" visible="true"></a-entity>
        <a-entity id="ent-birch" gltf-model="#tree-birch" class="clickable" gesture-handler scale="0.01 0.01 0.01" visible="false"></a-entity>
        <a-entity id="ent-sakura" gltf-model="#tree-sakura" class="clickable" gesture-handler scale="0.4 0.4 0.4" visible="false"></a-entity>

      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      const models = [
        { el: "#ent-palm", name: "Sawit Palm" },
        { el: "#ent-birch", name: "PSX Birch" },
        { el: "#ent-sakura", name: "Sakura Blossom" }
      ];

      let currentIndex = 0;

      function changeModel(dir) {
        // Hide current
        document.querySelector(models[currentIndex].el).setAttribute('visible', 'false');

        // Calculate next index (Looping)
        currentIndex += dir;
        if (currentIndex < 0) currentIndex = models.length - 1;
        if (currentIndex >= models.length) currentIndex = 0;

        // Show new
        const newModel = document.querySelector(models[currentIndex].el);
        newModel.setAttribute('visible', 'true');
        
        // Update UI
        document.getElementById('model-name').innerText = models[currentIndex].name;

        // Haptic-like feedback (small pop)
        const currentScale = newModel.getAttribute('scale');
        newModel.setAttribute('animation__pop', {
          property: 'scale',
          from: '0 0 0',
          to: `${currentScale.x} ${currentScale.y} ${currentScale.z}`,
          dur: 300,
          easing: 'easeOutBack'
        });
      }
    </script>
  </body>
</html>
