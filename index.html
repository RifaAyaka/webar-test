<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap');

        body { margin: 0; background: #fafafa; font-family: 'Montserrat', sans-serif; }
        model-viewer { width: 100%; height: 100vh; --poster-color: transparent; }

        /* PPKS Research Cards */
        .info-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 8px;
            padding: 14px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            border-left: 5px solid #FBC02D;
            color: #1b1b1b;
            width: 190px;
            text-align: left;
        }

        /* Seed Advertisement Card */
        .ad-card {
            background: white;
            border-radius: 12px;
            padding: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 220px;
            border: 2px solid #2e7d32;
        }

        .ad-card img {
            width: 100%;
            border-radius: 6px;
            display: block;
        }

        .ad-tag {
            background: #2e7d32;
            color: white;
            font-size: 9px;
            font-weight: 800;
            padding: 4px 8px;
            border-radius: 4px;
            display: inline-block;
            margin-top: 8px;
            text-transform: uppercase;
        }

        .card-header {
            font-size: 10px;
            font-weight: 800;
            color: #2e7d32;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .card-header::before { content: '•'; color: #FBC02D; font-size: 18px; }

        .card-body {
            font-size: 12px;
            font-weight: 600;
            line-height: 1.4;
            color: #333;
        }

        /* Navigation UI */
        .ui-container {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center; gap: 15px;
            z-index: 100; width: 90%;
        }

        .nav-row { display: flex; align-items: center; gap: 20px; }

        .ar-btn {
            background: #2e7d32; color: white; border: none; padding: 16px 40px;
            border-radius: 4px; font-weight: 800; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 4px 0 #1b5e20;
        }

        .nav-btn {
            background: white; color: #2e7d32; border: 2px solid #2e7d32;
            width: 45px; height: 45px; border-radius: 4px; cursor: pointer;
            font-weight: bold; font-size: 20px;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <model-viewer id="viewer"
        src="animal_crossing_palm_tree_background.glb"
        ar ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        shadow-intensity="1" 
        auto-rotate
        camera-orbit="45deg 75deg 15m">

        <button class="info-card tree-info" slot="hotspot-t1" data-position="0 7 0" data-normal="0 0 1">
            <div class="card-header">🧬 GENETICS</div>
            <div class="card-body">Height: 20–30m. DxP Varietas Unggul PPKS.</div>
        </button>

        <div class="ad-card tree-info" slot="hotspot-t-ad" data-position="-2.5 4 0" data-normal="0 0 1">
            <img src="image_06a7b2.jpg" alt="Seed Advertisement">
            <div class="ad-tag">Premium Seed Result</div>
        </div>

        <button class="info-card tree-info" slot="hotspot-t2" data-position="2.5 3 0" data-normal="0 0 1">
            <div class="card-header">📊 ECONOMIC YIELD</div>
            <div class="card-body">High CPO extraction rate. Sustainable growth cycle.</div>
        </button>

        <button class="info-card fert-info hidden" slot="hotspot-f1" data-position="0 2.5 0" data-normal="0 0 1">
            <div class="card-header">📦 DIMENSIONS</div>
            <div class="card-body">Large Format: 52 x 85 cm. Industrial Grade.</div>
        </button>

        <button class="info-card hole-info hidden" slot="hotspot-h1" data-position="0 1.2 0" data-normal="0 0 1">
            <div class="card-header">⚙️ SPECS</div>
            <div class="card-body">Dia: 13cm | Depth: 20-30cm. Precision application.</div>
        </button>

        <div class="ui-container">
            <div class="nav-row">
                <button class="nav-btn" onclick="changeModel(-1)">❮</button>
                <button class="ar-btn" onclick="viewer.activateAR()">OPEN AR CATALOG</button>
                <button class="nav-btn" onclick="changeModel(1)">❯</button>
            </div>
        </div>
    </model-viewer>

    <script>
        const modelData = [
            { src: "animal_crossing_palm_tree_background.glb", scale: "5 5 5", class: "tree-info" },
            { src: "fertilizer.glb", scale: "280 280 280", class: "fert-info" },
            { src: "millers_falls_no._980_drill__game_ready_model.glb", scale: "0.8 0.8 0.8", class: "hole-info" }
        ];

        let idx = 0;
        const viewer = document.querySelector('#viewer');

        function changeModel(dir) {
            // Hide all cards
            document.querySelectorAll('.tree-info, .fert-info, .hole-info').forEach(c => c.classList.add('hidden'));
            
            idx = (idx + dir + modelData.length) % modelData.length;
            const item = modelData[idx];
            
            viewer.src = item.src;
            viewer.scale = item.scale;
            
            // Show new cards
            document.querySelectorAll('.' + item.class).forEach(c => c.classList.remove('hidden'));
        }
    </script>
</body>
</html>
