<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background: #f5f5f5;
    overflow: hidden;
}

model-viewer {
    width: 100%;
    height: 100vh;
}

/* ===== CARD STYLE ===== */
.info-card, .ad-card {
    width: 200px;
    border-radius: 12px;
    padding: 12px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.2);
    background: white;
    text-align: left;
}

/* INFO CARD */
.info-card {
    border-left: 5px solid #fbc02d;
}

.card-header {
    font-weight: 800;
    font-size: 11px;
    color: #2e7d32;
    margin-bottom: 5px;
}

.card-body {
    font-size: 11px;
    line-height: 1.4;
}

/* AD CARD */
.ad-card {
    border: 2px solid #2e7d32;
    cursor: pointer;
    transition: 0.2s;
}

.ad-card:hover {
    transform: scale(1.05);
}

.ad-card img {
    width: 100%;
    border-radius: 8px;
}

/* OVERLAY */
#zoom-overlay {
    position: fixed;
    top:0;left:0;
    width:100%;height:100%;
    background: rgba(0,0,0,0.9);
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:999;
}

#zoom-overlay img {
    max-width:90%;
    max-height:80%;
}

/* BUTTON */
.ui {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
}

button {
    padding: 12px 25px;
    border:none;
    background:#2e7d32;
    color:white;
    font-weight:bold;
    border-radius:5px;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- ZOOM -->
<div id="zoom-overlay" onclick="closeZoom()">
    <img src="palm_oil_seeds_ads.png">
    <p style="color:white;">Tap untuk tutup</p>
</div>

<model-viewer id="viewer"
    src="Kecambah.glb"
    scale="18 18 18"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    camera-orbit="0deg 75deg 1.8m"
    ar>

    <!-- ===== SEBAR HOTSPOT (GA OVERLAP) ===== -->

    <!-- KIRI -->
    <div class="info-card" slot="hotspot-1"
        data-position="-0.15 0.05 0"
        data-normal="0 1 0">
        <div class="card-header">GENETIK</div>
        <div class="card-body">
            DxP unggul PPKS, produktivitas tinggi.
        </div>
    </div>

    <!-- KANAN -->
    <div class="info-card" slot="hotspot-2"
        data-position="0.15 0.05 0"
        data-normal="0 1 0">
        <div class="card-header">KETAHANAN</div>
        <div class="card-body">
            Tahan Ganoderma, umur panjang.
        </div>
    </div>

    <!-- DEPAN -->
    <div class="info-card" slot="hotspot-3"
        data-position="0 0.02 0.15"
        data-normal="0 0 1">
        <div class="card-header">PRODUKSI</div>
        <div class="card-body">
            Rendemen minyak tinggi.
        </div>
    </div>

    <!-- BELAKANG -->
    <div class="info-card" slot="hotspot-4"
        data-position="0 0.02 -0.15"
        data-normal="0 0 -1">
        <div class="card-header">PERTUMBUHAN</div>
        <div class="card-body">
            Cepat tumbuh & stabil.
        </div>
    </div>

    <!-- ATAS -->
    <div class="info-card" slot="hotspot-5"
        data-position="0 0.12 0"
        data-normal="0 1 0">
        <div class="card-header">VARIETAS</div>
        <div class="card-body">
            SP540, Yangambi, Langkat.
        </div>
    </div>

    <!-- AD (AGAK JAUH BIAR GAK NUTUP) -->
    <div class="ad-card" slot="hotspot-ad"
        data-position="0.25 0.03 0.15"
        data-normal="0 1 0"
        onclick="openZoom()">

        <img src="palm_oil_seeds_ads.png">
    </div>

</model-viewer>

<div class="ui">
    <button onclick="viewer.activateAR()">BUKA AR</button>
</div>

<script>
const viewer = document.getElementById("viewer");

function openZoom(){
    document.getElementById("zoom-overlay").style.display="flex";
}

function closeZoom(){
    document.getElementById("zoom-overlay").style.display="none";
}
</script>

</body>
</html>
