<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/dist/gestures.js"></script>
    <style>
      /* Instagram-style Tap Zones (Invisible) */
      .touch-zone {
        position: fixed; top: 0; bottom: 0; width: 35%; z-index: 999;
      }
      #left-zone { left: 0; }
      #right-zone { right: 0; }

      /* The Product Description Card (Like a Photo App) */
      #info-card {
        position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(10px);
        color: white; padding: 15px 20px; border-radius: 20px;
        text-align: center; z-index: 1000; font-family: 'Segoe UI', sans-serif;
        border: 1px solid rgba(255,255,255,0.3); pointer-events: none;
        width: 85%; max-width: 400px;
      }
      
      #product-name { font-size: 20px; display: block; margin-bottom: 5px; color: #81C784; }
      #product-desc { font-size: 14px; line-height: 1.4; opacity: 0.9; }
      
      #nav-hint {
        position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
        background: rgba(255, 255, 255, 0.1); color: white;
        padding: 5px 15px; border-radius: 15px; font-size: 10px;
        z-index: 1000; font-family: sans-serif; opacity: 0.8;
      }
    </style>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <div id="left-zone" class="touch-zone" onclick="changeModel(-1)"></div>
    <div id="right-zone" class="touch-zone" onclick="changeModel(1)"></div>
    
    <div id="info-card">
      <strong id="product-name">Palm Oil Tree</strong>
      <div id="product-desc">
        Pohon kelapa sawit adalah tanaman perkebunan terpenting yang menghasilkan minyak nabati (CPO) terbanyak di dunia dari buahnya.
      </div>
    </div>

    <div id="nav-hint">Tap edges to switch | Drag to rotate</div>

    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix;"
      gesture-detector
      renderer="colorManagement: true; logarithmicDepthBuffer: true;">
      
      <a-assets>
        <a-asset-item id="model-tree" src="animal_crossing_palm_tree_background.glb"></a-asset-item>
        <a-asset-item id="model-fertilizer" src="fertilizer.glb"></a-asset-item>
        <a-asset-item id="model-fertihole" src="millers_falls_no._980_drill__game_ready_model.glb"></a-asset-item>
      </a-assets>

      <a-marker type="pattern" url="pattern-images.patt" raycaster="objects: .clickable" emitevents="true" cursor="fuse: false; rayOrigin: mouse;">
        
        <a-entity id="ent-tree" 
                  gltf-model="#model-tree" 
                  class="clickable" 
                  gesture-handler="rotationFactor: 1.5"
                  scale="2.5 2.5 2.5" 
                  position="0 0.5 0"
                  visible="true">
        </a-entity>

        <a-entity id="ent-fertilizer" 
                  gltf-model="#model-fertilizer" 
                  class="clickable" 
                  gesture-handler
                  scale="0.05 0.05 0.05" 
                  position="0 0 0" 
                  visible="false">
        </a-entity>

        <a-entity id="ent-fertihole" 
                  gltf-model="#model-fertihole" 
                  class="clickable" 
                  gesture-handler
                  scale="0.5 0.5 0.5" 
                  position="0 0.2 0" 
                  visible="false">
        </a-entity>

      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      // The descriptions for your products
      const products = [
        {
          el: "#ent-tree",
          name: "Palm Oil Tree",
          desc: "Tanaman penghasil minyak goreng, margarin, dan biodisel. Minyak sawit sangat efisien lahan dan merupakan komoditas ekspor vital."
        },
        {
          el: "#ent-fertilizer",
          name: "Fertilizer (Pupuk)",
          desc: "Pupuk khusus sawit (N, P, K, Mg, B) sangat krusial untuk menjaga nutrisi tanaman dan meningkatkan hasil panen buah."
        },
        {
          el: "#ent-fertihole",
          name: "Fertihole (Alsin)",
          desc: "Alat pembuat lubang di tanah untuk pemupukan sistem kantong (pocket). Menekan kerugian pupuk hingga minimal, memastikan nutrisi terserap efektif oleh tanaman.<br><br><small>Diameter: 13cm | Kedalaman: 20-30cm</small>"
        }
      ];

      let currentIndex = 0;

      function changeModel(dir) {
        // Hide current model and reset its rotation
        const currentModel = document.querySelector(products[currentIndex].el);
        currentModel.setAttribute('visible', 'false');
        currentModel.setAttribute('rotation', '0 0 0');

        // Loop to next index
        currentIndex += dir;
        if (currentIndex < 0) currentIndex = products.length - 1;
        if (currentIndex >= products.length) currentIndex = 0;

        // Show new model
        const newModel = document.querySelector(products[currentIndex].el);
        newModel.setAttribute('visible', 'true');
        
        // Update UI
        document.getElementById('product-name').innerText = products[currentIndex].name;
        document.getElementById('product-desc').innerHTML = products[currentIndex].desc;

        // Small pop animation
        const s = newModel.getAttribute('scale');
        newModel.setAttribute('animation__pop', {
          property: 'scale',
          from: '0 0 0',
          to: `${s.x} ${s.y} ${s.z}`,
          dur: 300,
          easing: 'easeOutBack'
        });
      }
    </script>
  </body>
</html>
