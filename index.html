<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap');
        body { margin: 0; background: #ffffff; font-family: 'Montserrat', sans-serif; overflow: hidden; }
        
        #product-header {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: #2e7d32; color: white; padding: 10px 25px;
            border-radius: 30px; font-weight: 800; z-index: 1000; border: 2px solid #FBC02D;
        }

        #tutorial {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; z-index: 3000; transition: opacity 0.5s;
        }
        .hand-icon { font-size: 50px; animation: swipe 2s infinite; }
        @keyframes swipe { 0%, 100% { transform: translateX(-30px); } 50% { transform: translateX(30px); } }

        model-viewer { width: 100%; height: 100vh; }

        /* ORBITING DOTS */
        .dot {
            width: 30px; height: 30px; background: #2e7d32; border: 3px solid white;
            border-radius: 50%; cursor: pointer; box-shadow: 0 0 20px rgba(46,125,50,0.5);
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.3s; pointer-events: auto;
        }
        .dot:hover { transform: scale(1.2); background: #FBC02D; }

        /* PREVIEW CARD (ON CLICK DOT) */
        .preview-card {
            position: absolute; bottom: 45px; left: 50%; transform: translateX(-50%) scale(0);
            background: white; border-radius: 12px; padding: 12px; width: 200px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); border-left: 6px solid #2e7d32;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0; pointer-events: none; text-align: center;
        }
        .dot.active .preview-card { transform: translateX(-50%) scale(1); opacity: 1; pointer-events: auto; }

        /* FULL ZOOM OVERLAY (ON CLICK CARD) */
        #zoom-overlay {
            position: fixed; inset: 0; background: rgba(255,255,255,0.98);
            z-index: 5000; display: none; flex-direction: column;
            padding: 40px 25px; overflow-y: auto; align-items: center;
        }
        .zoom-content { max-width: 500px; width: 100%; position: relative; }
        .close-btn {
            position: fixed; top: 20px; right: 20px; width: 45px; height: 45px;
            background: #2e7d32; color: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; font-weight: 800; cursor: pointer; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .tag { font-size: 11px; font-weight: 800; color: #2e7d32; text-transform: uppercase; margin-bottom: 8px; display: block; }
        .text { font-size: 14px; font-weight: 500; color: #333; line-height: 1.6; }
        .zoom-text { font-size: 16px; line-height: 1.8; }
        .list { margin: 15px 0; padding-left: 20px; color: #2e7d32; font-weight: 700; }

        .ar-btn {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #2e7d32; color: white; padding: 15px 60px;
            border-radius: 14px; font-weight: 800; border: none; z-index: 1000;
        }
    </style>
</head>
<body onclick="closeAllDots(event)">

    <div id="product-header">KECAMBAH SAWIT PPKS</div>

    <div id="zoom-overlay">
        <button class="close-btn" onclick="closeZoom()">✕</button>
        <div class="zoom-content" id="zoom-body"></div>
    </div>

    <div id="tutorial" onclick="hideTutorial()">
        <div class="hand-icon">👆</div>
        <p style="font-weight: 800; margin-top: 20px; text-align: center;">TAP DOTS TO SEE INFO<br>TAP INFO TO ZOOM IN</p>
    </div>

    <button class="ar-btn" onclick="document.querySelector('#v').activateAR()">OPEN AR CATALOG</button>

    <model-viewer id="v" src="kecambah sawit.glb" ar ar-modes="webxr" 
                  camera-controls auto-rotate shadow-intensity="2" 
                  rotation-per-second="10deg" interaction-prompt="none">

        <div class="dot" slot="hotspot-1" data-position="-30 6 15" data-normal="0 0 1" onclick="handleDot(this, 'Description', `Varietas DyP Sungai Pancur I (SP-I) atau yang lebih dikenal sebagai Varietas Dumpy, merupakan varietas dengan keunggulan spesifik laju pertumbuhan meninggi yang lambat (<55 cm/tahun). Dengan karakter ini, Varietas Dumpy mampu mencapai umur ekonomi hingga 30 tahun atau lebih lama dari varietas lain.`, event)">
            <div class="preview-card">
                <span class="tag">Description</span>
                <p style="font-size:11px; margin:0;">Tap to read full...</p>
            </div>
        </div>

        <div class="dot" slot="hotspot-2" data-position="32 4 -20" data-normal="0 0 1" onclick="handleDot(this, 'Turunan SP540', `Varietas kelapa sawit dalam kelompok SP540 dihasilkan dari tetua pisifera keturunan SP540 murni PPKS.<br><br><b>Varietas:</b><ul class='list'><li>DxP PPKS 540</li><li>DxP Simalungun</li><li>DxP AVROS</li></ul>Karakter unggulan adalah quick starter dan persentase mesokarp tinggi.`, event)">
            <div class="preview-card">
                <span class="tag">Turunan SP540</span>
                <p style="font-size:11px; margin:0;">Tap to read full...</p>
            </div>
        </div>

        <div class="dot" slot="hotspot-3" data-position="-35 1 -25" data-normal="0 0 1" onclick="handleDot(this, 'Turunan Yangambi', `Yangambi merupakan populasi asal Afrika untuk benih unggul.<br><br><b>Varietas:</b><ul class='list'><li>DxP Yangambi</li><li>DxP PPKS 239</li><li>DxP PPKS 718</li></ul>Keunggulan pada bobot tandan besar dan kandungan minyak yang jauh lebih tinggi dari populasi lain.`, event)">
            <div class="preview-card">
                <span class="tag">Turunan Yangambi</span>
                <p style="font-size:11px; margin:0;">Tap to read full...</p>
            </div>
        </div>

        <div class="dot" slot="hotspot-4" data-position="30 2 25" data-normal="0 0 1" onclick="handleDot(this, 'DxP Langkat', `Rekombinasi tetua terbaik (SP540, Yangambi, Marihat) dengan Dura Deli. Karakter unggul rachis relatif pendek (compact palm) dan potensi CPO hingga 8,3 ton/ha/tahun. Berbuah pada umur 22 bulan.`, event)">
            <div class="preview-card">
                <span class="tag">DxP Langkat</span>
                <p style="font-size:11px; margin:0;">Tap to read full...</p>
            </div>
        </div>

        <div class="dot" slot="hotspot-5" data-position="0 8 35" data-normal="0 0 1" onclick="handleDot(this, 'DxP 540 NG', `Keturunan SP540T dengan ketahanan tinggi terhadap Ganoderma (New Generation).<br><br>Pada umur 6 tahun menghasilkan 35 ton TBS/ha/tahun dengan rendemen 26,5-27,4%. Kandungan mesokarp mencapai 84,5-87,5%.`, event)">
            <div class="preview-card">
                <span class="tag">DxP 540 NG</span>
                <p style="font-size:11px; margin:0;">Tap to read full...</p>
            </div>
        </div>

    </model-viewer>

    <script>
        function hideTutorial() {
            document.getElementById('tutorial').style.opacity = '0';
            setTimeout(() => document.getElementById('tutorial').style.display = 'none', 500);
        }

        function handleDot(el, title, fullText, e) {
            e.stopPropagation();
            hideTutorial();
            
            if (el.classList.contains('active')) {
                // If already active, open the Big Zoom
                openZoom(title, fullText);
            } else {
                // Otherwise just activate the dot
                closeAllDots();
                el.classList.add('active');
            }
        }

        function openZoom(title, content) {
            const body = document.getElementById('zoom-body');
            body.innerHTML = `<span class="tag">${title}</span><div class="text zoom-text">${content}</div>`;
            document.getElementById('zoom-overlay').style.display = 'flex';
        }

        function closeZoom() {
            document.getElementById('zoom-overlay').style.display = 'none';
        }

        function closeAllDots(e) {
            document.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
            if(e) hideTutorial();
        }
    </script>
</body>
</html>
