<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

<style>
body { margin:0; overflow:hidden; font-family:sans-serif; }

.nav-zone {
  position: fixed;
  top:0; bottom:0;
  width:30%;
  z-index:999;
}
#l-zone { left:0; }
#r-zone { right:0; }

#top-ui {
  position: fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:#2e7d32;
  color:white;
  padding:10px 20px;
  border-radius:20px;
  z-index:1000;
  font-weight:bold;
}
</style>
</head>

<body>

<div id="l-zone" class="nav-zone" onclick="changeModel(-1)"></div>
<div id="r-zone" class="nav-zone" onclick="changeModel(1)"></div>

<div id="top-ui"><span id="m-name">DXP 540 NG</span></div>

<a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;"
         renderer="logarithmicDepthBuffer: true;"
         vr-mode-ui="enabled: false">

<a-assets>
  <a-asset-item id="model-k" src="kecambah_sawit.glb"></a-asset-item>
  <a-asset-item id="model-f" src="fertilizer.glb"></a-asset-item>
  <img id="img-ad" src="palm_oil_seeds_ads.png">
</a-assets>

<a-marker preset="hiro">

<!-- ===== KECAMBAH ===== -->
<a-entity id="g-k" visible="true">

  <!-- MODEL -->
  <a-entity gltf-model="#model-k"
            scale="1.5 1.5 1.5"
            position="0 0 0"
            rotation="0 0 0"
            animation="property: rotation; to: 0 360 0; loop: true; dur: 8000">
  </a-entity>

  <!-- CARD KIRI -->
  <a-plane position="-2 1.2 0"
           rotation="-90 0 0"
           width="2.5" height="1.5"
           color="#ffffff" opacity="0.95">

    <a-text value="VARIETAS\nDxP 540 NG\nTahan Ganoderma"
            align="center"
            color="#000"
            width="4">
    </a-text>
  </a-plane>

  <!-- CARD KANAN -->
  <a-plane position="2 1.2 0"
           rotation="-90 0 0"
           width="2.5" height="1.5"
           color="#ffffff" opacity="0.95">

    <a-text value="PRODUKSI\n35 Ton/Ha\nRendemen 27%"
            align="center"
            color="#000"
            width="4">
    </a-text>
  </a-plane>

  <!-- IKLAN (FIX GAK KE POTONG) -->
  <a-plane position="0 1.2 2"
           rotation="-90 0 0"
           width="2.5" height="2.5"
           color="#ffffff">

    <a-image src="#img-ad"
             width="2.3"
             height="2.3"
             position="0 0 0.05">
    </a-image>

  </a-plane>

</a-entity>

<!-- ===== PUPUK ===== -->
<a-entity id="g-f" visible="false">

  <a-entity gltf-model="#model-f"
            scale="15 15 15"
            position="0 0 0">
  </a-entity>

  <a-plane position="0 1.2 2"
           rotation="-90 0 0"
           width="3" height="1.5"
           color="#000" opacity="0.8">

    <a-text value="PUPUK PPKS\nNPK + Mg\n50KG"
            align="center"
            color="#fff"
            width="5">
    </a-text>

  </a-plane>

</a-entity>

</a-marker>

<a-entity camera></a-entity>

</a-scene>

<script>
const catalog = [
  { id: "#g-k", name: "DXP 540 NG" },
  { id: "#g-f", name: "PUPUK PPKS" }
];

let cur = 0;

function changeModel(dir){
  document.querySelector(catalog[cur].id).setAttribute('visible', false);
  cur = (cur + dir + catalog.length) % catalog.length;
  document.querySelector(catalog[cur].id).setAttribute('visible', true);
  document.getElementById("m-name").innerText = catalog[cur].name;
}
</script>

</body>
</html>
