<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      /* Instagram-style Nav Taps */
      .nav-tap { position: fixed; top: 0; bottom: 0; width: 30%; z-index: 999; }
      #l-tap { left: 0; }
      #r-tap { right: 0; }
      
      /* Top Label UI */
      #top-ui {
        position: fixed; top: 25px; left: 50%; transform: translateX(-50%);
        background: rgba(46, 125, 50, 0.95); backdrop-filter: blur(10px);
        color: white; padding: 12px 25px; border-radius: 30px;
        text-align: center; z-index: 1000; font-family: 'Montserrat', sans-serif;
        border: 2px solid #FBC02D; font-weight: 800; min-width: 220px;
      }
    </style>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <div id="l-tap" class="nav-tap" onclick="changeModel(-1)"></div>
    <div id="r-tap" class="nav-tap" onclick="changeModel(1)"></div>
    
    <div id="top-ui"><span id="m-name">DXP 540 NG</span></div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      <a-assets>
        <a-asset-item id="model-k" src="kecambah sawit.glb"></a-asset-item>
        <a-asset-item id="model-f" src="fertilizer.glb"></a-asset-item>
        <img id="img-ad" src="palm_oil_seeds_ads.png">
      </a-assets>

      <a-marker type="pattern" url="pattern-images.patt">
        
        <a-entity id="g-k" visible="true">
          <a-entity gltf-model="#model-k" scale="2 2 2" position="0 0.5 0" 
                    animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear">
          </a-entity>
          
          <a-entity position="-4.5 1.5 1" rotation="-90 0 0">
            <a-plane width="3.8" height="2.8" color="#fff" opacity="0.95" border="0.1 2e7d32">
              <a-plane width="3.8" height="0.5" color="#2e7d32" position="0 1.15 0.01">
                <a-text value="PPKS VARIETAS INFO" align="center" width="6.5" color="#fff" font="roboto"></a-text>
              </a-plane>
              
              <a-entity position="-1.7 0.5 0.02">
                <a-text value="VARIETAS:" color="#2e7d32" width="4.5" font="bold"></a-text>
                <a-text value="DxP 540 NG" position="0 -0.25 0" color="#333" width="4"></a-text>
                
                <a-text value="KARAKTER:" position="0 -0.7 0" color="#2e7d32" width="4.5"></a-text>
                <a-text value="Anti Ganoderma\nQuick Starter" position="0 -0.95 0" color="#333" width="4"></a-text>

                <a-text value="RENDEMEN:" position="0 -1.45 0" color="#2e7d32" width="4.5"></a-text>
                <a-text value="27.4%" position="0 -1.7 0" color="#333" width="4"></a-text>
              </a-entity>
            </a-plane>
          </a-entity>

          <a-entity position="4.5 1.5 1" rotation="-90 0 0">
            <a-plane width="3.5" height="1.8" color="#FBC02D" padding="0.1">
               <a-image src="#img-ad" width="3.3" height="1.6" position="0 0 0.05"></a-image>
            </a-plane>
          </a-entity>
        </a-entity>

        <a-entity id="g-f" visible="false">
          <a-entity gltf-model="#model-f" scale="30 30 30" position="0 0 0"></a-entity>
          <a-entity position="4 1 0" rotation="-90 0 0">
            <a-plane width="3" height="1.5" color="#000" opacity="0.8">
              <a-text value="PUPUK SAWIT PPKS\nFormula NPK+Mg\nKapasitas 50KG" align="center" width="5.5" color="#fff"></a-text>
            </a-plane>
          </a-entity>
        </a-entity>

      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      const catalog = [
        { id: "#g-k", name: "DXP 540 NG" },
        { id: "#g-f", name: "PUPUK PPKS" }
      ];

      let cur = 0;
      function changeModel(dir) {
        document.querySelector(catalog[cur].id).setAttribute('visible', 'false');
        cur = (cur + dir + catalog.length) % catalog.length;
        document.querySelector(catalog[cur].id).setAttribute('visible', 'true');
        document.querySelector('#m-name').innerText = catalog[cur].name;
      }
    </script>
  </body>
</html>
