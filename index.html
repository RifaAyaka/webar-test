<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background: #000; font-family: 'Inter', sans-serif; }
        model-viewer { width: 100%; height: 100vh; --poster-color: transparent; }

        /* Professional Glassmorphism Cards */
        .info-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 12px;
            padding: 12px 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: #1b1b1b;
            width: 180px;
            transition: opacity 0.3s;
        }

        .card-header {
            font-size: 11px;
            font-weight: 800;
            color: #2e7d32;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .card-body {
            font-size: 14px;
            font-weight: 500;
            line-height: 1.3;
        }

        /* Navigation Buttons */
        .ui-overlay {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            display: flex; align-items: center; gap: 20px; z-index: 100;
        }

        .ar-btn {
            background: #2e7d32; color: white; border: none; padding: 15px 30px;
            border-radius: 50px; font-weight: bold; cursor: pointer;
            box-shadow: 0 10px 20px rgba(46, 125, 50, 0.3);
        }

        .nav-btn {
            background: rgba(255,255,255,0.2); color: white; border: 1px solid white;
            width: 50px; height: 50px; border-radius: 50%; cursor: pointer;
        }

        /* Hide hotspots when model is not active */
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <model-viewer id="viewer"
        src="animal_crossing_palm_tree_background.glb"
        ar ar-modes="webxr" 
        camera-controls 
        shadow-intensity="1" 
        auto-rotate
        camera-orbit="45deg 75deg 10m">

        <button class="info-card tree-info" slot="hotspot-t1" data-position="0 5 0" data-normal="0 0 1">
            <div class="card-header">Height Profile</div>
            <div class="card-body">Professional height range: 20 – 30 Meters.</div>
        </button>
        <button class="info-card tree-info" slot="hotspot-t2" data-position="1 2.5 0" data-normal="0 0 1">
            <div class="card-header">Economic Yield</div>
            <div class="card-body">Primary source for CPO & PKO global exports.</div>
        </button>

        <button class="info-card fert-info hidden" slot="hotspot-f1" data-position="0 1.5 0" data-normal="0 0 1">
            <div class="card-header">Package Dimensions</div>
            <div class="card-body">Standard: 45x75 cm<br>Large: 52x85 cm</div>
        </button>
        <button class="info-card fert-info hidden" slot="hotspot-f2" data-position="0.5 0.5 0.5" data-normal="0 0 1">
            <div class="card-header">Application</div>
            <div class="card-body">Designed for efficient Pocket System release.</div>
        </button>

        <button class="info-card hole-info hidden" slot="hotspot-h1" data-position="0 1.2 0" data-normal="0 0 1">
            <div class="card-header">Bore Specs</div>
            <div class="card-body">Diameter: 13 cm<br>Depth: 20 – 30 cm</div>
        </button>
        <button class="info-card hole-info hidden" slot="hotspot-h2" data-position="0.5 0.8 0" data-normal="0 0 1">
            <div class="card-header">Load Capacity</div>
            <div class="card-body">Max 500g fertilizer per injection pocket.</div>
        </button>
        <button class="info-card hole-info hidden" slot="hotspot-h3" data-position="-0.5 0.5 0" data-normal="0 0 1">
            <div class="card-header">Efficiency</div>
            <div class="card-body">Consumption: 2.4 L/Ha<br>Petrol Mix Engine.</div>
        </button>

        <div class="ui-overlay">
            <button class="nav-btn" onclick="changeModel(-1)">❮</button>
            <button class="ar-btn" onclick="viewer.activateAR()">EXPLORE IN AR</button>
            <button class="nav-btn" onclick="changeModel(1)">❯</button>
        </div>
    </model-viewer>

    <script>
        const modelData = [
            { src: "animal_crossing_palm_tree_background.glb", scale: "5 5 5", class: "tree-info" },
            { src: "fertilizer.glb", scale: "150 150 150", class: "fert-info" },
            { src: "millers_falls_no._980_drill__game_ready_model.glb", scale: "1.5 1.5 1.5", class: "hole-info" }
        ];

        let idx = 0;
        const viewer = document.querySelector('#viewer');

        function changeModel(dir) {
            // Hide all cards first
            document.querySelectorAll('.info-card').forEach(c => c.classList.add('hidden'));

            idx = (idx + dir + modelData.length) % modelData.length;
            const item = modelData[idx];

            // Change Model & Scale
            viewer.src = item.src;
            viewer.scale = item.scale;

            // Show cards for the current model
            document.querySelectorAll('.' + item.class).forEach(c => c.classList.remove('hidden'));
        }
    </script>
</body>
</html>
    </script>
</body>
</html>
