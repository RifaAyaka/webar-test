<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap');

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #ffffff; font-family: 'Montserrat', sans-serif;
        }

        model-viewer { width: 100%; height: 100%; --poster-color: transparent; }

        /* Top Bar Label */
        .header-label {
            position: absolute; top: 40px; left: 50%; transform: translateX(-50%);
            background: #2e7d32; color: white; padding: 10px 25px;
            border-radius: 30px; font-size: 11px; font-weight: 800;
            z-index: 100; text-transform: uppercase;
        }

        /* Fixed Screen Cards (NOT Hotspots) to prevent Overlap */
        .fixed-card {
            position: absolute; bottom: 130px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 12px; padding: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            z-index: 80; pointer-events: none;
        }
        .card-left { left: 20px; border-left: 5px solid #2e7d32; width: 140px; }
        .card-right { right: 20px; border: 2px solid #FBC02D; width: 90px; height: 90px; padding: 4px; }
        .card-right img { width: 100%; height: 100%; border-radius: 8px; object-fit: cover; }

        .info-title { font-size: 9px; font-weight: 800; color: #2e7d32; margin-bottom: 5px; text-transform: uppercase; }
        .info-row { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 4px 0; }
        .info-key { font-size: 8px; color: #888; }
        .info-val { font-size: 9px; font-weight: 700; color: #222; }

        /* Navigation Taps */
        .nav-tap { position: absolute; top: 0; width: 30%; height: 80%; z-index: 60; }
        .nav-prev { left: 0; }
        .nav-next { right: 0; }

        /* AR Button Panel */
        .ar-container {
            position: absolute; bottom: 50px; left: 0; width: 100%;
            display: flex; justify-content: center; z-index: 100;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .ar-btn {
            background: #2e7d32; color: white; border: none;
            padding: 16px 60px; border-radius: 14px; font-weight: 800;
            font-size: 14px; text-transform: uppercase; cursor: pointer;
            box-shadow: 0 8px 20px rgba(46, 125, 50, 0.3);
        }
    </style>
</head>
<body>

    <div class="header-label" id="top-label">Kecambah Sawit PPKS</div>

    <div class="nav-tap nav-prev" onclick="changeModel(-1)"></div>
    <div class="nav-tap nav-next" onclick="changeModel(1)"></div>

    <div class="fixed-card card-left">
        <div class="info-title">Spesifikasi</div>
        <div class="info-row"><span class="info-key">Varietas</span><span class="info-val" id="v1">DxP 540 NG</span></div>
        <div class="info-row"><span class="info-key">Karakter</span><span class="info-val" id="v2">Tahan Gano</span></div>
        <div class="info-row" style="border:none;"><span class="info-key">Yield</span><span class="info-val" id="v3">27.4%</span></div>
    </div>

    <div class="fixed-card card-right">
        <img id="side-photo" src="palm_oil_seeds_ads.png">
    </div>

    <model-viewer id="viewer"
        src="kecambah sawit.glb"
        scale="1 1 1"
        ar ar-modes="webxr scene-viewer quick-look" 
        camera-controls auto-rotate shadow-intensity="1"
        camera-orbit="0deg 75deg 6m" 
        field-of-view="20deg"
        interaction-prompt="none">

        <div class="ar-container">
            <button class="ar-btn" id="ar-btn" onclick="handleARClick()">Buka AR</button>
        </div>
    </model-viewer>

    <script>
        const products = [
            {
                name: "Kecambah Sawit PPKS",
                v1: "DxP 540 NG", v2: "Tahan Gano", v3: "27.4%",
                src: "kecambah sawit.glb",
                orbit: "0deg 75deg 6m", // Further back
                fov: "20deg", // Narrower view makes the seed look smaller
                photo: "palm_oil_seeds_ads.png"
            },
            {
                name: "Pupuk Industri",
                v1: "Premium", v2: "Industri", v3: "Slow Release",
                src: "fertilizer.glb",
                orbit: "45deg 75deg 15m",
                fov: "30deg",
                photo: "palm_oil_seeds_ads.png"
            }
        ];

        let idx = 0;
        const viewer = document.querySelector('#viewer');
        const btn = document.querySelector('#ar-btn');

        function changeModel(dir) {
            idx = (idx + dir + products.length) % products.length;
            const item = products[idx];
            
            viewer.src = item.src;
            viewer.setAttribute("camera-orbit", item.orbit);
            viewer.setAttribute("field-of-view", item.fov);
            
            document.getElementById('top-label').innerText = item.name;
            document.getElementById('v1').innerText = item.v1;
            document.getElementById('v2').innerText = item.v2;
            document.getElementById('v3').innerText = item.v3;
            document.getElementById('side-photo').src = item.photo;
        }

        function handleARClick() {
            if (viewer.getAttribute('ar-status') === 'session-started') {
                location.reload(); 
            } else {
                viewer.activateAR();
            }
        }

        viewer.addEventListener('ar-status', (event) => {
            if (event.detail.status === 'session-started') {
                btn.innerText = "Kembali";
            } else {
                btn.innerText = "Buka AR";
            }
        });
    </script>
</body>
</html>
