<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap');
        body { margin: 0; background: #fafafa; font-family: 'Montserrat', sans-serif; overflow: hidden; }
        model-viewer { width: 100%; height: 100vh; --poster-color: transparent; }

        /* KEEPING YOUR EXACT CARD STYLE */
        .info-card {
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
            border-radius: 8px; padding: 14px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            border-left: 5px solid #FBC02D; color: #1b1b1b; width: 190px;
            text-align: left; cursor: move; touch-action: none;
        }

        .ad-card {
            background: white; border-radius: 12px; padding: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 220px;
            border: 2px solid #2e7d32; cursor: move; touch-action: none;
        }
        .ad-card img { width: 100%; border-radius: 6px; display: block; pointer-events: none; }

        /* PRODUCT NAME TOP CENTER */
        #product-title {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: #2e7d32; color: white; padding: 10px 25px;
            border-radius: 30px; font-weight: 800; z-index: 1000;
        }

        /* INSTAGRAM NAV ZONES */
        .nav-zone { position: fixed; top: 0; bottom: 0; width: 30%; z-index: 500; }
        #l-zone { left: 0; }
        #r-zone { right: 0; }

        .card-header { font-size: 10px; font-weight: 800; color: #2e7d32; margin-bottom: 6px; }
        .card-body { font-size: 12px; font-weight: 600; color: #333; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="product-title">DXP 540 NG</div>
    <div id="l-zone" class="nav-zone" onclick="changeModel(-1)"></div>
    <div id="r-zone" class="nav-zone" onclick="changeModel(1)"></div>

    <model-viewer id="viewer" src="kecambah sawit.glb" ar ar-modes="webxr" camera-controls auto-rotate>

        <div id="h1" class="info-card tree-info drag" slot="hotspot-1" data-position="-2.5 2.5 0" data-normal="0 0 1">
            <div class="card-header">🧬 GENETICS</div>
            <div class="card-body">DxP 540 NG. Moderat Tahan Ganoderma.</div>
        </div>

        <div id="h2" class="ad-card tree-info drag" slot="hotspot-2" data-position="2.5 1.5 0.5" data-normal="0 0 1">
            <img src="palm_oil_seeds_ads.png">
        </div>

        <div id="h3" class="info-card tree-info drag" slot="hotspot-3" data-position="-2.5 0.5 0.5" data-normal="0 0 1">
            <div class="card-header">📊 YIELD</div>
            <div class="card-body">35 Ton TBS/Ha. Rendemen 27.4%.</div>
        </div>

        <div id="h4" class="info-card tree-info drag" slot="hotspot-4" data-position="2.5 0 0" data-normal="0 0 1">
            <div class="card-header">📍 ORIGIN</div>
            <div class="card-body">PPKS Medan, Indonesia.</div>
        </div>

    </model-viewer>

    <script>
        const models = [
            { src: "kecambah sawit.glb", name: "DXP 540 NG", class: "tree-info" },
            { src: "fertilizer.glb", name: "PUPUK PPKS", class: "fert-info" }
        ];

        let idx = 0;
        const viewer = document.querySelector('#viewer');

        function changeModel(dir) {
            document.querySelectorAll('.tree-info, .fert-info').forEach(c => c.classList.add('hidden'));
            idx = (idx + dir + models.length) % models.length;
            viewer.src = models[idx].src;
            document.getElementById('product-title').innerText = models[idx].name;
            document.querySelectorAll('.' + models[idx].class).forEach(c => c.classList.remove('hidden'));
        }

        // REAL DRAG LOGIC FOR 3D HOTSPOTS
        document.querySelectorAll('.drag').forEach(el => {
            let dragging = false;
            let lastX, lastY;

            el.addEventListener('pointerdown', e => {
                dragging = true;
                lastX = e.clientX;
                lastY = e.clientY;
                el.setPointerCapture(e.pointerId);
            });

            window.addEventListener('pointermove', e => {
                if (!dragging) return;
                
                const deltaX = (e.clientX - lastX) * 0.01;
                const deltaY = (lastY - e.clientY) * 0.01;

                let pos = el.getAttribute('data-position').split(' ').map(Number);
                pos[0] += deltaX; 
                pos[1] += deltaY;

                el.setAttribute('data-position', pos.join(' '));
                lastX = e.clientX;
                lastY = e.clientY;
            });

            el.addEventListener('pointerup', e => dragging = false);
        });
    </script>
</body>
</html>
