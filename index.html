<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&display=swap');
        body { margin: 0; background: #000; font-family: 'Montserrat', sans-serif; overflow: hidden; }
        
        /* Product Title Top Center */
        #top-label {
            position: fixed; top: 25px; left: 50%; transform: translateX(-50%);
            background: rgba(46, 125, 50, 0.9); color: white; padding: 10px 30px;
            border-radius: 30px; z-index: 1000; border: 2px solid #FBC02D;
            text-transform: uppercase; font-size: 14px; letter-spacing: 1px;
        }

        /* Instagram-style Nav Zones */
        .nav-zone { position: fixed; top: 0; bottom: 0; width: 30%; z-index: 500; }
        #left-zone { left: 0; }
        #right-zone { right: 0; }

        model-viewer { width: 100%; height: 100vh; }

        /* Draggable Card Styling */
        .drag-card {
            background: white; border-radius: 12px; padding: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); width: 180px;
            border-left: 6px solid #2e7d32; cursor: move;
            user-select: none; touch-action: none; /* Required for dragging */
        }
        .drag-card.image-type { padding: 6px; border: 2px solid #2e7d32; width: 200px; }
        .drag-card img { width: 100%; border-radius: 6px; pointer-events: none; }
        
        .card-title { font-size: 10px; color: #2e7d32; margin-bottom: 5px; font-weight: 800; }
        .card-text { font-size: 11px; color: #333; font-weight: 600; line-height: 1.3; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="top-label">DXP 540 NG</div>
    
    <div id="left-zone" class="nav-zone" onclick="move(-1)"></div>
    <div id="right-zone" class="nav-zone" onclick="move(1)"></div>

    <model-viewer id="v" src="kecambah sawit.glb" ar ar-modes="webxr" camera-controls auto-rotate>

        <div id="c1" class="drag-card tree-info" slot="hotspot-1" data-position="-1 2 0">
            <div class="card-title">🧬 GENETICS</div>
            <div class="card-text">DxP 540 NG. Moderat Tahan Ganoderma. Quick Starter.</div>
        </div>

        <div id="c2" class="drag-card image-type tree-info" slot="hotspot-2" data-position="1 1.5 0.5">
            <img src="palm_oil_seeds_ads.png">
        </div>

        <div id="c3" class="drag-card tree-info" slot="hotspot-3" data-position="-1.2 0.8 0.8">
            <div class="card-title">📊 YIELD</div>
            <div class="card-text">Potensi TBS: 35 Ton/Ha. Rendemen: 27.4%.</div>
        </div>

        <div id="c4" class="drag-card tree-info" slot="hotspot-4" data-position="1.2 0.5 -0.5">
            <div class="card-title">📍 ORIGIN</div>
            <div class="card-text">Pusat Penelitian Kelapa Sawit (PPKS) Medan.</div>
        </div>

    </model-viewer>

    <script>
        const catalog = [
            { src: "kecambah sawit.glb", name: "DXP 540 NG", cls: "tree-info" },
            { src: "fertilizer.glb", name: "PUPUK PPKS", cls: "fert-info" }
        ];

        let idx = 0;
        const viewer = document.querySelector('#v');
        const label = document.querySelector('#top-label');

        function move(dir) {
            document.querySelectorAll('.drag-card').forEach(c => c.classList.add('hidden'));
            idx = (idx + dir + catalog.length) % catalog.length;
            viewer.src = catalog[idx].src;
            label.innerText = catalog[idx].name;
            document.querySelectorAll('.' + catalog[idx].cls).forEach(c => c.classList.remove('hidden'));
        }

        // DRAG LOGIC (Updates Hotspot Offset)
        document.querySelectorAll('.drag-card').forEach(card => {
            let isDragging = false;
            let startX, startY;

            card.addEventListener('pointerdown', (e) => {
                isDragging = true;
                startX = e.clientX;
                startY = e.clientY;
                card.setPointerCapture(e.pointerId);
            });

            card.addEventListener('pointermove', (e) => {
                if (!isDragging) return;
                const dx = (e.clientX - startX) / 50; // Sensitivity
                const dy = (startY - e.clientY) / 50;
                
                // Get current position from attribute
                let pos = card.getAttribute('data-position').split(' ').map(Number);
                pos[0] += dx; // Update X
                pos[1] += dy; // Update Y
                
                card.setAttribute('data-position', pos.join(' '));
                startX = e.clientX;
                startY = e.clientY;
            });

            card.addEventListener('pointerup', (e) => {
                isDragging = false;
                card.releasePointerCapture(e.pointerId);
            });
        });
    </script>
</body>
</html>
