<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap');

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #ffffff; font-family: 'Montserrat', sans-serif;
        }

        model-viewer { width: 100%; height: 100%; --poster-color: transparent; }

        /* Floating Info Cards (Hotspots) - Positioned to the sides */
        .floating-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            padding: 12px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
            width: 150px;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .card-table { border-left: 4px solid #2e7d32; }
        .card-photo { border: 2px solid #FBC02D; padding: 5px; width: 100px; height: 100px; }
        .card-photo img { width: 100%; height: 100%; border-radius: 8px; object-fit: cover; }

        .info-title { font-size: 9px; font-weight: 800; color: #2e7d32; margin-bottom: 5px; text-transform: uppercase; }
        .info-row { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 4px 0; }
        .info-key { font-size: 8px; color: #777; }
        .info-val { font-size: 9px; font-weight: 700; color: #333; }

        /* Instagram Navigation Layers */
        .nav-tap { position: absolute; top: 0; width: 25%; height: 80%; z-index: 50; }
        .nav-prev { left: 0; }
        .nav-next { right: 0; }

        /* Top Header Label */
        .header-label {
            position: absolute; top: 30px; left: 50%; transform: translateX(-50%);
            background: #2e7d32; color: white; padding: 10px 25px;
            border-radius: 30px; font-size: 11px; font-weight: 800;
            z-index: 100; text-transform: uppercase; letter-spacing: 1px;
        }

        /* Fixed Bottom AR Toggle */
        .ar-container {
            position: absolute; bottom: 50px; left: 0; width: 100%;
            display: flex; justify-content: center; z-index: 100;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .ar-btn {
            background: #2e7d32; color: white; border: none;
            padding: 16px 60px; border-radius: 14px; font-weight: 800;
            font-size: 14px; text-transform: uppercase; cursor: pointer;
            box-shadow: 0 10px 20px rgba(46, 125, 50, 0.3);
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="header-label" id="top-label">Kecambah Sawit PPKS</div>

    <div class="nav-tap nav-prev" onclick="changeModel(-1)"></div>
    <div class="nav-tap nav-next" onclick="changeModel(1)"></div>

    <model-viewer id="viewer"
        src="kecambah sawit.glb"
        ar ar-modes="webxr scene-viewer quick-look" 
        camera-controls auto-rotate shadow-intensity="1"
        camera-orbit="0deg 75deg 2.5m"
        min-camera-orbit="auto auto 1m"
        interaction-prompt="none">

        <div class="floating-card card-table" slot="hotspot-data" data-position="-0.4 0.2 0" data-normal="-1 0 0">
            <div class="info-title">Detail Produk</div>
            <div class="info-row"><span class="info-key">Varietas</span><span class="info-val" id="val-1">DxP 540 NG</span></div>
            <div class="info-row"><span class="info-key">Karakter</span><span class="info-val" id="val-2">Tahan Gano</span></div>
            <div class="info-row" style="border:none;"><span class="info-key">Rendemen</span><span class="info-val" id="val-3">27.4%</span></div>
        </div>

        <div class="floating-card card-photo" slot="hotspot-photo" data-position="0.4 0.2 0" data-normal="1 0 0">
            <img id="side-photo" src="palm_oil_seeds_ads.png">
        </div>

        <div class="ar-container">
            <button class="ar-btn" id="ar-button" onclick="viewer.activateAR()">Buka AR</button>
        </div>
    </model-viewer>

    <script>
        const products = [
            {
                name: "Kecambah Sawit PPKS",
                v1: "DxP 540 NG", v2: "Tahan Gano", v3: "27.4%",
                src: "kecambah sawit.glb",
                orbit: "0deg 75deg 2.5m",
                photo: "palm_oil_seeds_ads.png"
            },
            {
                name: "Pupuk Sawit",
                v1: "Formula Cair", v2: "Industri", v3: "High Yield",
                src: "fertilizer.glb",
                orbit: "45deg 75deg 15m",
                photo: "palm_oil_seeds_ads.png"
            },
            {
                name: "Alat Fertihole",
                v1: "Manual Drill", v2: "Presisi", v3: "Deep Hole",
                src: "millers_falls_no._980_drill__game_ready_model.glb",
                orbit: "45deg 75deg 15m",
                photo: "palm_oil_seeds_ads.png"
            }
        ];

        let idx = 0;
        const viewer = document.querySelector('#viewer');
        const arBtn = document.querySelector('#ar-button');

        function changeModel(dir) {
            idx = (idx + dir + products.length) % products.length;
            const item = products[idx];
            
            viewer.src = item.src;
            viewer.setAttribute("camera-orbit", item.orbit);
            
            document.getElementById('top-label').innerText = item.name;
            document.getElementById('val-1').innerText = item.v1;
            document.getElementById('val-2').innerText = item.v2;
            document.getElementById('val-3').innerText = item.v3;
            document.getElementById('side-photo').src = item.photo;
        }

        // Logic for "Buka AR" vs "Kembali"
        viewer.addEventListener('ar-status', (event) => {
            if (event.detail.status === 'session-started') {
                arBtn.innerText = "Kembali";
            } else {
                arBtn.innerText = "Buka AR";
            }
        });
    </script>
</body>
</html>
