<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap');

        body { margin: 0; background: #fafafa; font-family: 'Montserrat', sans-serif; }
        model-viewer { width: 100%; height: 100vh; --poster-color: transparent; }

        /* PPKS Research-Style Cards */
        .info-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 8px;
            padding: 14px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            border-left: 5px solid #FBC02D; /* PPKS Gold Accent */
            color: #1b1b1b;
            width: 200px;
            border-top: none; border-right: none; border-bottom: none;
            text-align: left;
        }

        .card-header {
            font-size: 10px;
            font-weight: 800;
            color: #2e7d32; /* PPKS Green */
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Icon Simulators */
        .card-header::before {
            content: '•';
            color: #FBC02D;
            font-size: 18px;
        }

        .card-body {
            font-size: 13px;
            font-weight: 600;
            line-height: 1.4;
            color: #333;
        }

        /* Professional Navigation Overlay */
        .ui-container {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center; gap: 15px;
            z-index: 100; width: 90%;
        }

        .nav-row { display: flex; align-items: center; gap: 20px; }

        .ar-btn {
            background: #2e7d32; color: white; border: none; padding: 16px 40px;
            border-radius: 4px; font-weight: 800; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 4px 0 #1b5e20;
        }

        .nav-btn {
            background: white; color: #2e7d32; border: 2px solid #2e7d32;
            width: 45px; height: 45px; border-radius: 4px; cursor: pointer;
            font-weight: bold; font-size: 20px;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <model-viewer id="viewer"
        src="animal_crossing_palm_tree_background.glb"
        ar ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        shadow-intensity="1" 
        auto-rotate
        camera-orbit="45deg 75deg 15m">

        <button class="info-card tree-info" slot="hotspot-t1" data-position="0 6 0" data-normal="0 0 1">
            <div class="card-header">🧬 GENETICS</div>
            <div class="card-body">Height Profile: 20 – 30 Meters. Optimal for Tenera hybrid research.</div>
        </button>
        <button class="info-card tree-info" slot="hotspot-t2" data-position="2 3 0" data-normal="0 0 1">
            <div class="card-header">📊 PRODUCTIVITY</div>
            <div class="card-body">High-yield CPO extraction potential for sustainable plantations.</div>
        </button>

        <button class="info-card fert-info hidden" slot="hotspot-f1" data-position="0 2 0" data-normal="0 0 1">
            <div class="card-header">📦 DIMENSIONS</div>
            <div class="card-body">Standard: 45x75 cm<br>Large: 52x85 cm</div>
        </button>
        <button class="info-card fert-info hidden" slot="hotspot-f2" data-position="1 0.5 0" data-normal="0 0 1">
            <div class="card-header">🧪 COMPOSITION</div>
            <div class="card-body">Enriched NPK+Mg formula for volcanic and peat soil types.</div>
        </button>

        <button class="info-card hole-info hidden" slot="hotspot-h1" data-position="0 1.2 0" data-normal="0 0 1">
            <div class="card-header">⚙️ MECHANIZATION</div>
            <div class="card-body">Diameter: 13 cm<br>Depth: 20 – 30 cm</div>
        </button>
        <button class="info-card hole-info hidden" slot="hotspot-h2" data-position="0.8 0.5 0" data-normal="0 0 1">
            <div class="card-header">⚖️ DOSAGE</div>
            <div class="card-body">Precision Pocket System: Max 500g per injection point.</div>
        </button>

        <div class="ui-container">
            <div class="nav-row">
                <button class="nav-btn" onclick="changeModel(-1)">❮</button>
                <button class="ar-btn" onclick="viewer.activateAR()">OPEN AR RESEARCH</button>
                <button class="nav-btn" onclick="changeModel(1)">❯</button>
            </div>
        </div>
    </model-viewer>

    <script>
        const modelData = [
            { src: "animal_crossing_palm_tree_background.glb", scale: "5 5 5", class: "tree-info" },
            { src: "fertilizer.glb", scale: "250 250 250", class: "fert-info" }, // Massively boosted
            { src: "millers_falls_no._980_drill__game_ready_model.glb", scale: "1 1 1", class: "hole-info" } // Compact size
        ];

        let idx = 0;
        const viewer = document.querySelector('#viewer');

        function changeModel(dir) {
            document.querySelectorAll('.info-card').forEach(c => c.classList.add('hidden'));
            idx = (idx + dir + modelData.length) % modelData.length;
            const item = modelData[idx];
            viewer.src = item.src;
            viewer.scale = item.scale;
            document.querySelectorAll('.' + item.class).forEach(c => c.classList.remove('hidden'));
        }
    </script>
</body>
</html>
