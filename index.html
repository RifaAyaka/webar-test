<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap');
        body { margin: 0; background: #ffffff; font-family: 'Montserrat', sans-serif; overflow: hidden; }
        
        /* HEADER */
        #product-header {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: #2e7d32; color: white; padding: 10px 25px;
            border-radius: 30px; font-weight: 800; z-index: 1000; border: 2px solid #FBC02D;
        }

        /* TUTORIAL OVERLAY */
        #tutorial {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; z-index: 2000; transition: opacity 0.5s; pointer-events: auto;
        }
        .hand-icon { font-size: 50px; animation: swipe 2s infinite; }
        @keyframes swipe { 0%, 100% { transform: translateX(-30px); } 50% { transform: translateX(30px); } }

        model-viewer { width: 100%; height: 100vh; }

        /* THE ORBITING DOTS */
        .dot {
            width: 24px; height: 24px; background: #2e7d32; border: 3px solid white;
            border-radius: 50%; cursor: pointer; box-shadow: 0 0 15px rgba(46, 125, 50, 0.6);
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: auto;
        }
        .dot:hover { transform: scale(1.3); background: #FBC02D; }

        /* THE HIDDEN INFO CARDS */
        .info-card {
            position: absolute; bottom: 35px; left: 50%; transform: translateX(-50%) scale(0);
            background: white; border-radius: 12px; padding: 12px; width: 180px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); border-left: 6px solid #2e7d32;
            transition: transform 0.4s ease, opacity 0.4s; opacity: 0;
            pointer-events: none; transform-origin: bottom center;
        }
        .dot.active .info-card { transform: translateX(-50%) scale(1); opacity: 1; pointer-events: auto; }
        .dot.active { background: #FBC02D; box-shadow: 0 0 25px #FBC02D; }

        .orbit-ad { width: 220px; padding: 5px; }
        .orbit-ad img { width: 100%; border-radius: 6px; display: block; }
        .tag { font-size: 9px; font-weight: 800; color: #2e7d32; text-transform: uppercase; }
        .text { font-size: 11px; font-weight: 600; color: #333; margin-top: 4px; }

        .ar-btn {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #2e7d32; color: white; padding: 15px 50px;
            border-radius: 12px; font-weight: 800; border: none; z-index: 1000;
        }
    </style>
</head>
<body onclick="closeAll(event)">

    <div id="product-header">KECAMBAH SAWIT PPKS</div>

    <div id="tutorial" onclick="startApp()">
        <div class="hand-icon">👆</div>
        <p style="font-weight: 800; margin-top: 20px; text-align: center;">CLICK DOTS FOR INFO<br>DRAG TO ROTATE 360°</p>
    </div>

    <button class="ar-btn" onclick="document.querySelector('#v').activateAR()">BUKA AR</button>

    <model-viewer id="v" src="kecambah sawit.glb" ar ar-modes="webxr" 
                  camera-controls auto-rotate shadow-intensity="1.5" 
                  rotation-per-second="8deg" interaction-prompt="none">

        <div class="dot" slot="hotspot-1" data-position="-25 3 15" data-normal="0 0 1" onclick="toggleDot(this, event)">
            <div class="info-card">
                <div class="tag">🧬 GENETICS</div>
                <div class="text">DxP 540 NG. Moderat Tahan Ganoderma.</div>
            </div>
        </div>

        <div class="dot" slot="hotspot-2" data-position="28 5 -10" data-normal="0 0 1" onclick="toggleDot(this, event)">
            <div class="info-card orbit-ad">
                <img src="palm_oil_seeds_ads.png">
            </div>
        </div>

        <div class="dot" slot="hotspot-3" data-position="-28 2 -15" data-normal="0 0 1" onclick="toggleDot(this, event)">
            <div class="info-card">
                <div class="tag">📊 YIELD</div>
                <div class="text">35 Ton TBS/Ha. Rendemen 27.4%.</div>
            </div>
        </div>

        <div class="dot" slot="hotspot-4" data-position="25 4 20" data-normal="0 0 1" onclick="toggleDot(this, event)">
            <div class="info-card">
                <div class="tag">📍 ORIGIN</div>
                <div class="text">PPKS Medan, Indonesia.</div>
            </div>
        </div>

    </model-viewer>

    <script>
        function startApp() {
            document.getElementById('tutorial').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('tutorial').style.display = 'none';
            }, 500);
        }

        function toggleDot(el, e) {
            e.stopPropagation();
            const isActive = el.classList.contains('active');
            closeAll();
            if (!isActive) el.classList.add('active');
            startApp(); // Dismiss tutorial if they click a dot
        }

        function closeAll(e) {
            document.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
            if (e) startApp(); // Dismiss tutorial on first click anywhere
        }
    </script>
</body>
</html>
